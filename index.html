<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniCondo | Student Housing Near Your University</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBfbugmOoOnX9f_wL8RzgttgqP76J6g-gY&callback=initMap" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --coral: #FF5A5F;
            --coral-dark: #E04E53;
            --gradient: linear-gradient(135deg, #FF5A5F 0%, #FF8A6C 100%);
            --bg: #F7F7F7;
            --white: #FFFFFF;
            --text: #222222;
            --text-light: #717171;
            --border: #DDDDDD;
            --border-light: #EBEBEB;
            --radius: 12px;
            --shadow: 0 2px 8px rgba(0,0,0,0.1);
            --shadow-lg: 0 6px 20px rgba(0,0,0,0.15);
        }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg); color: var(--text);
            display: flex; flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        /* ─── HEADER ─── */
        .header {
            background: var(--gradient);
            padding: 0 24px;
            flex-shrink: 0;
            z-index: 100;
        }
        .header-inner {
            max-width: 1400px; margin: 0 auto;
            display: flex; align-items: center;
            height: 64px; gap: 32px;
        }
        .logo {
            display: flex; align-items: center; gap: 8px;
            text-decoration: none; color: white; flex-shrink: 0;
        }
        .logo svg { width: 28px; height: 28px; }
        .logo-text { font-weight: 800; font-size: 20px; letter-spacing: -0.3px; }
        .nav { display: flex; gap: 4px; }
        .nav a {
            color: rgba(255,255,255,0.85); text-decoration: none;
            font-size: 14px; font-weight: 600; padding: 8px 14px;
            border-radius: 8px; transition: all 0.2s;
        }
        .nav a:hover { background: rgba(255,255,255,0.15); color: white; }
        .header-search {
            flex: 1; max-width: 420px;
            display: flex; align-items: center;
            background: rgba(255,255,255,0.2); border-radius: 24px;
            padding: 6px 6px 6px 16px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.25);
            transition: all 0.2s;
        }
        .header-search:focus-within {
            background: rgba(255,255,255,0.3);
            border-color: rgba(255,255,255,0.4);
        }
        .header-search input {
            flex: 1; background: none; border: none; outline: none;
            color: white; font-size: 14px; font-family: inherit;
        }
        .header-search input::placeholder { color: rgba(255,255,255,0.7); }
        .header-search button {
            background: white; border: none; width: 32px; height: 32px;
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; cursor: pointer; flex-shrink: 0;
        }
        .header-search button svg { width: 14px; height: 14px; color: var(--coral); }
        .header-right { display: flex; align-items: center; gap: 12px; margin-left: auto; }
        .header-auth-btn {
            background: white; color: var(--coral); border: none;
            padding: 8px 18px; border-radius: 20px; font-size: 13px;
            font-weight: 700; cursor: pointer; font-family: inherit;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .header-auth-btn:hover { transform: scale(1.03); box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .header-user {
            display: flex; align-items: center; gap: 8px;
            color: white; font-size: 13px; font-weight: 600;
        }
        .header-user-avatar {
            width: 32px; height: 32px; border-radius: 50%;
            background: rgba(255,255,255,0.3); display: flex;
            align-items: center; justify-content: center;
            border: 2px solid white;
        }
        .header-user-avatar svg { width: 16px; height: 16px; color: white; }
        .header-logout {
            background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3);
            color: white; padding: 6px 14px; border-radius: 16px; font-size: 12px;
            font-weight: 600; cursor: pointer; font-family: inherit;
            transition: background 0.2s;
        }
        .header-logout:hover { background: rgba(255,255,255,0.3); }

        /* ─── MAIN LAYOUT ─── */
        .main {
            flex: 1; display: flex; overflow: hidden;
        }

        /* ─── MAP PANEL ─── */
        .map-panel {
            width: 45%; position: relative;
        }
        #map { width: 100%; height: 100%; }
        .campus-label {
            background: #1a73e8; color: white; font-weight: 700;
            font-size: 12px; padding: 5px 10px; border-radius: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3); white-space: nowrap;
            font-family: 'Nunito', sans-serif; text-align: center;
            border: 2px solid white;
        }

        /* ─── SORT BAR ─── */
        .sort-bar {
            display: flex; gap: 8px; padding: 12px 24px;
            border-bottom: 1px solid var(--border-light);
            background: var(--white); flex-shrink: 0;
        }
        .sort-btn {
            padding: 6px 14px; border-radius: 20px;
            border: 1.5px solid var(--border); background: white;
            font-size: 13px; font-weight: 600; cursor: pointer;
            font-family: inherit; color: var(--text);
            transition: all 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94); display: flex; align-items: center; gap: 4px;
        }
        .sort-btn:hover { border-color: var(--text); transform: translateY(-1px); }
        .sort-btn:active { transform: scale(0.95); }
        .sort-btn.active {
            background: var(--text); color: white; border-color: var(--text);
            animation: sortBounce 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .sort-btn svg { width: 12px; height: 12px; }
        @keyframes sortBounce { 0% { transform: scale(0.9); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }

        /* ─── LISTINGS PANEL ─── */
        .listings-panel {
            width: 55%; display: flex; flex-direction: column;
            border-left: 1px solid var(--border-light);
            background: var(--white);
        }
        .listings-header {
            padding: 16px 24px; border-bottom: 1px solid var(--border-light);
            display: flex; justify-content: space-between; align-items: center;
            background: var(--white); flex-shrink: 0;
        }
        .listings-header h2 { font-size: 18px; font-weight: 800; }
        .listings-header span { font-size: 13px; color: var(--text-light); font-weight: 600; }
        .listings-scroll {
            flex: 1; overflow-y: auto; padding: 16px 24px;
        }
        .listings-scroll::-webkit-scrollbar { width: 6px; }
        .listings-scroll::-webkit-scrollbar-thumb {
            background: var(--border); border-radius: 3px;
        }

        /* ─── LISTING CARD ─── */
        .listing-card {
            display: flex; gap: 16px; padding: 16px 0;
            border-bottom: 1px solid var(--border-light);
            cursor: pointer; transition: background 0.2s, transform 0.2s;
            position: relative;
        }
        .listing-card:hover { background: #FAFAFA; margin: 0 -24px; padding: 16px 24px; transform: translateX(4px); }
        .listing-card:active { transform: scale(0.99); }
        .listing-card:last-child { border-bottom: none; }
        .listing-img {
            width: 200px; height: 140px; border-radius: 10px;
            object-fit: cover; flex-shrink: 0;
            background: #E8E8E8;
        }
        .listing-info { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 4px; }
        .listing-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .listing-title { font-size: 16px; font-weight: 700; color: var(--text); }
        .listing-rating {
            display: flex; align-items: center; gap: 4px;
            font-size: 14px; font-weight: 600; flex-shrink: 0;
        }
        .listing-rating svg { width: 14px; height: 14px; color: var(--coral); }
        .listing-distance { font-size: 14px; color: var(--text-light); }
        .listing-details { font-size: 14px; color: var(--text-light); }
        .listing-price { font-size: 16px; font-weight: 800; margin-top: 4px; }
        .listing-price span { font-weight: 500; font-size: 14px; color: var(--text-light); }
        .listing-badge {
            display: inline-block; background: var(--coral);
            color: white; font-size: 11px; font-weight: 700;
            padding: 3px 8px; border-radius: 4px; margin-bottom: 4px;
        }
        .listing-delete {
            position: absolute; top: 16px; right: 0;
            background: white; border: 1px solid var(--border);
            color: var(--coral); font-size: 12px; font-weight: 600;
            padding: 4px 10px; border-radius: 6px; cursor: pointer;
            font-family: inherit; display: none; transition: all 0.2s;
        }
        .listing-delete.show { display: block; }
        .listing-delete:hover { background: var(--coral); color: white; border-color: var(--coral); }

        /* ─── POST LISTING BUTTON ─── */
        .post-btn {
            position: fixed; bottom: 24px; right: 24px;
            background: var(--gradient); color: white; border: none;
            padding: 14px 24px; border-radius: 28px; font-size: 15px;
            font-weight: 700; cursor: pointer; font-family: inherit;
            box-shadow: var(--shadow-lg); transition: transform 0.2s;
            z-index: 50; display: none;
        }
        .post-btn:hover { transform: scale(1.05); }
        .post-btn.show { display: flex; align-items: center; gap: 8px; }
        .post-btn svg { width: 18px; height: 18px; }

        /* ─── MODAL ─── */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            z-index: 500; display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: white; border-radius: 16px; padding: 32px;
            width: 100%; max-width: 440px; box-shadow: 0 16px 48px rgba(0,0,0,0.2);
            animation: modalIn 0.25s ease-out;
            max-height: 90vh; overflow-y: auto;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: translateY(16px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 24px;
        }
        .modal-title { font-size: 20px; font-weight: 800; }
        .modal-close {
            background: none; border: none; font-size: 22px; cursor: pointer;
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s; color: var(--text);
        }
        .modal-close:hover { background: var(--bg); }
        .form-group { margin-bottom: 14px; }
        .form-group label {
            display: block; font-size: 13px; font-weight: 700;
            margin-bottom: 5px; color: var(--text);
        }
        .form-group input, .form-group select {
            width: 100%; padding: 11px 14px; border: 1.5px solid var(--border);
            border-radius: 8px; font-size: 14px; font-family: inherit;
            transition: border-color 0.2s; outline: none;
        }
        .form-group input:focus, .form-group select:focus { border-color: var(--coral); }
        .form-row { display: flex; gap: 10px; }
        .form-row .form-group { flex: 1; }
        .btn-submit {
            width: 100%; padding: 13px; background: var(--gradient);
            color: white; border: none; border-radius: 8px;
            font-size: 15px; font-weight: 700; cursor: pointer;
            font-family: inherit; transition: opacity 0.2s; margin-top: 4px;
        }
        .btn-submit:hover { opacity: 0.9; }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
        .form-msg {
            font-size: 13px; margin-top: 8px; font-weight: 600;
            display: none; text-align: center;
        }
        .form-msg.error { display: block; color: var(--coral); }
        .form-msg.success { display: block; color: #008A05; }
        .auth-switch {
            text-align: center; margin-top: 16px; font-size: 14px;
            color: var(--text-light);
        }
        .auth-switch a {
            color: var(--coral); font-weight: 700;
            text-decoration: none; cursor: pointer;
        }
        .auth-switch a:hover { text-decoration: underline; }
        .auth-divider {
            display: flex; align-items: center; gap: 12px;
            margin: 18px 0; color: var(--text-light); font-size: 13px;
        }
        .auth-divider::before, .auth-divider::after {
            content: ''; flex: 1; height: 1px; background: var(--border);
        }
        .btn-google {
            width: 100%; padding: 12px; background: white;
            border: 1.5px solid var(--border); border-radius: 8px;
            font-size: 14px; font-weight: 600; cursor: pointer;
            font-family: inherit; display: flex; align-items: center;
            justify-content: center; gap: 10px; transition: all 0.2s;
            color: var(--text);
        }
        .btn-google:hover { background: #f8f8f8; border-color: #bbb; }
        .btn-google svg { width: 18px; height: 18px; }
        .spinner {
            display: inline-block; width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
            border-radius: 50%; animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ─── TOAST ─── */
        .toast {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: var(--text); color: white; padding: 12px 24px;
            border-radius: 8px; font-size: 14px; font-weight: 600;
            z-index: 999; opacity: 0; transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }

        /* ─── EMPTY STATE ─── */
        .empty-state {
            text-align: center; padding: 48px 24px; color: var(--text-light);
        }
        .empty-state p { font-size: 15px; margin-top: 8px; }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 900px) {
            html, body { height: auto; overflow: auto; }
            body { display: block; }
            .main { flex-direction: column; overflow: visible; height: auto; flex: none; }
            .map-panel { width: 100%; height: 280px; flex-shrink: 0; }
            .listings-panel {
                width: 100%; min-height: 0; overflow: visible;
                border-left: none; border-top: 1px solid var(--border-light);
            }
            .listings-scroll {
                overflow: visible; flex: none;
                padding: 12px 16px;
            }
            .listings-header { padding: 12px 16px; }
            .listings-header h2 { font-size: 16px; }
            .sort-bar { padding: 10px 16px; overflow-x: auto; flex-wrap: nowrap; }
            .sort-btn { white-space: nowrap; flex-shrink: 0; font-size: 12px; padding: 5px 12px; }
            .nav { display: none; }
            .header-search { max-width: 240px; }
            .header-inner { gap: 16px; }
            .listing-card { padding: 12px 0; gap: 12px; }
            .listing-card:hover { margin: 0; padding: 12px 0; background: none; }
            .listing-img { width: 140px; height: 100px; border-radius: 8px; }
            .listing-title { font-size: 15px; }
            .listing-price { font-size: 15px; }
            .post-btn { bottom: 16px; right: 16px; padding: 12px 18px; font-size: 14px; border-radius: 24px; }
        }
        @media (max-width: 600px) {
            .header-search { display: none; }
            .header-inner { height: 56px; padding: 0 12px; }
            .logo-text { font-size: 18px; }
            .map-panel { height: 220px; }
            .listing-card { flex-direction: column; gap: 10px; }
            .listing-img { width: 100%; height: 180px; border-radius: 10px; }
            .listings-scroll { padding: 10px 14px; }
            .listings-header { padding: 10px 14px; }
            .sort-bar { padding: 8px 14px; gap: 6px; }
            .listing-info { gap: 3px; }
            .listing-title { font-size: 15px; }
            .listing-distance { font-size: 13px; }
            .listing-details { font-size: 13px; }
            .listing-price { font-size: 16px; margin-top: 2px; }
            .post-btn { bottom: 12px; right: 12px; }
            .modal { margin: 12px; padding: 24px; border-radius: 14px; }
        }
        /* ─── MICRO INTERACTIONS ─── */
        .listing-img { transition: transform 0.4s ease; }
        .listing-card:hover .listing-img { transform: scale(1.03); border-radius: 10px; }
        .header-search input { transition: border-color 0.3s, box-shadow 0.3s; }
        .header-search input:focus { box-shadow: 0 0 0 3px rgba(255,90,95,0.15); }
        .post-btn { transition: transform 0.2s, box-shadow 0.2s; }
        .post-btn:active { transform: scale(0.95); }
        .btn-submit { transition: transform 0.15s, opacity 0.2s; }
        .btn-submit:active { transform: scale(0.97); }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }
        .shake { animation: shake 0.4s ease; }
        .success-check {
            display: inline-block; width: 40px; height: 40px; border-radius: 50%;
            background: #00C853; margin: 8px auto; position: relative;
        }
        .success-check::after {
            content: ''; position: absolute; left: 14px; top: 8px;
            width: 10px; height: 18px; border: 3px solid white;
            border-top: none; border-left: none;
            transform: rotate(45deg); animation: checkDraw 0.3s ease-out 0.1s both;
        }
        @keyframes checkDraw {
            0% { height: 0; width: 0; opacity: 0; }
            50% { height: 0; width: 10px; opacity: 1; }
            100% { height: 18px; width: 10px; opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header class="header">
        <div class="header-inner">
            <a href="index.html" class="logo">
                <svg viewBox="0 0 32 32" fill="currentColor">
                    <path d="M16 2L3 14h4v14h7v-9h4v9h7V14h4L16 2z"/>
                </svg>
                <span class="logo-text">UniCondo</span>
            </a>
            <nav class="nav">
                <a href="explore.html">Explore</a>
                <a href="about.html">About</a>
            </nav>
            <div class="header-search">
                <input type="text" placeholder="Search by university, area, or condo name..." id="searchInput">
                <button>
                    <svg fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                </button>
            </div>
            <div class="header-right" id="headerRight">
                <!-- Filled by JS -->
            </div>
        </div>
    </header>

    <!-- MAIN LAYOUT -->
    <div class="main">
        <!-- MAP -->
        <div class="map-panel">
            <div id="map"></div>
        </div>
        <!-- LISTINGS -->
        <div class="listings-panel">
            <div class="listings-header">
                <h2>Condos near ABAC</h2>
                <span id="listingCount">Loading...</span>
            </div>
            <div class="sort-bar">
                <button class="sort-btn active" onclick="sortListings('default')">
                    All
                </button>
                <button class="sort-btn" onclick="sortListings('price-low')">
                    Price
                    <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7"/></svg>
                </button>
                <button class="sort-btn" onclick="sortListings('price-high')">
                    Price
                    <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
                </button>
                <button class="sort-btn" onclick="sortListings('distance')">
                    Nearest
                </button>
            </div>
            <div class="listings-scroll" id="listingsContainer">
                <!-- Filled by JS -->
            </div>
        </div>
    </div>

    <!-- POST LISTING FAB -->
    <button class="post-btn" id="postBtn" onclick="openModal('listing')">
        <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" d="M12 5v14m-7-7h14"/>
        </svg>
        Post Listing
    </button>

    <!-- AUTH MODAL -->
    <div class="modal-overlay" id="authModal">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title" id="authTitle">Log in</span>
                <button class="modal-close" onclick="closeModals()">×</button>
            </div>
            <button class="btn-google" onclick="handleGoogleLogin()">
                <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Continue with Google
            </button>
            <div class="auth-divider">or</div>
            <form id="authForm" onsubmit="handleAuth(event)">
                <div class="form-group" id="nameGroup" style="display:none;">
                    <label>Name</label>
                    <input type="text" id="authName" placeholder="Your name">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="authEmail" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="authPassword" placeholder="••••••••" required minlength="6">
                </div>
                <div class="form-msg" id="authMsg"></div>
                <button type="submit" class="btn-submit" id="authBtn">Log in</button>
            </form>
            <div class="auth-switch" id="authSwitch">
                Don't have an account? <a onclick="toggleAuthMode()">Sign up</a>
            </div>
        </div>

    <script>

    function updateMapMarkers(listings) {
        // Clear old markers
        markers.forEach(m => m.setMap(null));
        markers = [];

        listings.forEach(l => {
            if (!l.lat || !l.lng) return;
            const pos = { lat: Number(l.lat), lng: Number(l.lng) };

            // Clean dot marker
            const marker = new google.maps.Marker({
                position: pos,
                map: map,
                icon: {
                    path: google.maps.SymbolPath.CIRCLE,
                    fillColor: '#FF5A5F',
                    fillOpacity: 1,
                    strokeColor: 'white',
                    strokeWeight: 2,
                    scale: 8
                },
                title: l.title,
                zIndex: 100
            });

            // Info window on click
            marker.addListener('click', () => {
                const dist = getDistance(ABAC, pos);
                infoWindow.setContent(`
                    <div style="font-family:Nunito,sans-serif; padding:4px; min-width:200px;">
                        <strong style="font-size:15px;">${l.title}</strong><br>

                        <a href="https://www.google.com/maps/dir/${ABAC.lat},${ABAC.lng}/${pos.lat},${pos.lng}" target="_blank"

                           🧭 Get Directions →

                    </div>
                `);

                const card = document.querySelector('.listing-card[data-id="' + l.id + '"]');
                if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            });

            // Highlight on hover
            marker.addListener('mouseover', () => {
                marker.setIcon({ ...marker.getIcon(), fillColor: '#222', scale: 10 });
                const el = document.querySelector('.listing-card[data-id="' + l.id + '"]');
                if (el) el.style.background = '#FFF5F5';
            });
            marker.addListener('mouseout', () => {

            markers.push(marker);
        });
    }

    // Calculate distance between two lat/lng points
    function getDistance(p1, p2) {
        const R = 6371;
        const dLat = (p2.lat - p1.lat) * Math.PI / 180;
        const dLng = (p2.lng - p1.lng) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(p1.lat * Math.PI / 180) * Math.cos(p2.lat * Math.PI / 180) *
            Math.sin(dLng/2) * Math.sin(dLng/2);
        const d = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return d < 1 ? Math.round(d * 1000) + 'm' : d.toFixed(1) + 'km';
    }

    // ══════════════════════════════════════
    // AUTH
    // ══════════════════════════════════════
    async function initAuth() {
        try {
            const { data: { session } } = await sb.auth.getSession();
            currentUser = session?.user || null;
            updateHeaderUI();

            sb.auth.onAuthStateChange((_, session) => {
                currentUser = session?.user || null;
                updateHeaderUI();
                loadListings();
            });
            console.log('✅ Auth ready', currentUser ? currentUser.email : '(not logged in)');
        } catch (e) {
            console.error('❌ Auth init failed:', e);
        }
    }

    function updateHeaderUI() {
        const el = document.getElementById('headerRight');
        const postBtn = document.getElementById('postBtn');

        if (currentUser) {
            el.innerHTML = `
                <div class="header-user">
                    <div class="header-user-avatar">
                        <svg fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 12c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm0 2c-3.87 0-7 2.24-7 5v1h14v-1c0-2.76-3.13-5-7-5z"/>
                        </svg>
                    </div>
                    <a href="profile.html" style="color:white; text-decoration:none; font-weight:600;">${currentUser.email.split('@')[0]}</a>
                </div>
                <button class="header-logout" onclick="handleLogout()">Log out</button>
            `;
            postBtn.classList.add('show');
        } else {
            el.innerHTML = `
                <button class="header-auth-btn" onclick="openModal('auth')">Log in / Sign up</button>
            `;
            postBtn.classList.remove('show');
        }
    }

    function toggleAuthMode() {
        isSignUp = !isSignUp;
        document.getElementById('authTitle').textContent = isSignUp ? 'Sign up' : 'Log in';
        document.getElementById('authBtn').textContent = isSignUp ? 'Create account' : 'Log in';
        document.getElementById('nameGroup').style.display = isSignUp ? 'block' : 'none';
        document.getElementById('authSwitch').innerHTML = isSignUp
            ? 'Already have an account? <a onclick="toggleAuthMode()">Log in</a>'
            : "Don't have an account? <a onclick=\"toggleAuthMode()\">Sign up</a>";
        clearMsg('authMsg');
    }

    async function handleAuth(e) {
        e.preventDefault();
        const btn = document.getElementById('authBtn');
        const email = document.getElementById('authEmail').value;
        const password = document.getElementById('authPassword').value;

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>';
        clearMsg('authMsg');

        try {
            if (isSignUp) {
                const name = document.getElementById('authName').value;
                const { error } = await sb.auth.signUp({
                    email, password,
                    options: { data: { name } }
                });
                if (error) throw error;
                showMsg('authMsg', 'Account created! You can now log in.', 'success');
                setTimeout(() => { isSignUp = true; toggleAuthMode(); }, 1500);
            } else {
                const { error } = await sb.auth.signInWithPassword({ email, password });
                if (error) throw error;
                closeModals();
                showToast('Welcome back!');
            }
        } catch (err) {
            showMsg('authMsg', err.message, 'error');
        }

        btn.disabled = false;
        btn.textContent = isSignUp ? 'Create account' : 'Log in';

    // ══════════════════════════════════════
    // LISTINGS
    // ══════════════════════════════════════
    let allListings = [];

    async function loadListings() {
        try {
            const { data, error } = await sb
                .from('listings')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) throw error;

            allListings = data;
            document.getElementById('listingCount').textContent = `${data.length} listings`;
            renderListings(data);
            updateMapMarkers(data);
            console.log(`✅ Loaded ${data.length} listings`);
        } catch (e) {
            console.error('❌ Load listings failed:', e);
            document.getElementById('listingsContainer').innerHTML =
                '<div class="empty-state"><p>Failed to load listings. Check console.</p></div>';
        }
    }

    function sortListings(mode) {
        // Update active button
        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
        event.currentTarget.classList.add('active');

        let sorted = [...allListings];
        if (mode === 'price-low') {
            sorted.sort((a, b) => a.price - b.price);
        } else if (mode === 'price-high') {
            sorted.sort((a, b) => b.price - a.price);
        } else if (mode === 'distance') {
            sorted.sort((a, b) => {
                const dA = getDistance(ABAC, { lat: Number(a.lat), lng: Number(a.lng) });
                const dB = getDistance(ABAC, { lat: Number(b.lat), lng: Number(b.lng) });
                const numA = parseFloat(dA);
                const numB = parseFloat(dB);
                return numA - numB;
            });
        }
        renderListings(sorted);
    }

    function renderListings(listings) {
        const container = document.getElementById('listingsContainer');
        if (!listings.length) {
            container.innerHTML = '<div class="empty-state"><p>No listings yet. Be the first to post!</p></div>';
            return;
        }

        container.innerHTML = listings.map(l => `
            <div class="listing-card" data-id="${l.id}"
                onmouseenter="highlightMarker('${l.id}', true)"
                onmouseleave="highlightMarker('${l.id}', false)">
                <img class="listing-img"
                    src="${l.image_url || ''}"
                    alt="${l.title}"
                    onerror="this.style.background='linear-gradient(135deg,#f0f0f0,#e0e0e0)'; this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 140%22><rect fill=%22%23e8e8e8%22 width=%22200%22 height=%22140%22/><text x=%22100%22 y=%2275%22 text-anchor=%22middle%22 fill=%22%23bbb%22 font-size=%2214%22>No photo</text></svg>'">
                <div class="listing-info">
                    ${l.badge ? `<span class="listing-badge">${l.badge}</span>` : ''}
                    <div class="listing-top">
                        <span class="listing-title">${l.title}</span>
                        <span class="listing-rating">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                            ${Number(l.rating).toFixed(1)}
                        </span>
                    </div>
                    <span class="listing-distance">${l.distance}</span>
                    <span class="listing-details">${l.details}</span>
                    <div class="listing-price">฿${Number(l.price).toLocaleString()} <span>/month</span></div>
                </div>
                <button class="listing-delete ${currentUser && currentUser.id === l.user_id ? 'show' : ''}"
                    onclick="event.stopPropagation(); deleteListing('${l.id}')">Delete</button>
            </div>
        `).join('');
    }

    function highlightMarker(id, active) {
        const el = document.querySelector(`.price-marker[data-id="${id}"]`);
        if (el) el.classList.toggle('active', active);
    }

    // ══════════════════════════════════════
    // CREATE / DELETE
    // ══════════════════════════════════════
    async function handleCreateListing(e) {
        e.preventDefault();
        const btn = document.getElementById('listingBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>';
        clearMsg('listingMsg');

        try {
            const listing = {
                user_id: currentUser.id,
                title: document.getElementById('listTitle').value,
                price: parseInt(document.getElementById('listPrice').value),
                rating: parseFloat(document.getElementById('listRating').value) || 5.0,
                distance: document.getElementById('listDistance').value,
                details: document.getElementById('listDetails').value,
                category: document.getElementById('listCategory').value,
                badge: document.getElementById('listBadge').value || null,
                image_url: document.getElementById('listImage').value || null,
                lat: 13.6116 + (Math.random() - 0.5) * 0.02,
                lng: 100.8370 + (Math.random() - 0.5) * 0.02,
            };

            const { error } = await sb.from('listings').insert([listing]);
            if (error) throw error;

            closeModals();
            document.getElementById('listingForm').reset();
            showToast('Listing posted!');
            loadListings();
        } catch (err) {
            showMsg('listingMsg', err.message, 'error');
        }

        btn.disabled = false;
        btn.textContent = 'Post listing';
    }

    async function deleteListing(id) {
        if (!confirm('Delete this listing?')) return;
        try {
            const { error } = await sb.from('listings').delete().eq('id', id);
            if (error) throw error;
            showToast('Listing deleted');
            loadListings();
        } catch (err) {
            showToast('Error: ' + err.message);
        }
    }

    // ══════════════════════════════════════
    // MODALS & UTILS
    // ══════════════════════════════════════
    function openModal(type) {
        closeModals();
        if (type === 'auth') {
            isSignUp = false;
            toggleAuthMode(); toggleAuthMode();
            document.getElementById('authModal').classList.add('show');
        } else if (type === 'listing') {
            if (!currentUser) { openModal('auth'); return; }
            document.getElementById('listingModal').classList.add('show');
        }
    }

    function closeModals() {
        document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('show'));
    }

    document.querySelectorAll('.modal-overlay').forEach(overlay => {
        overlay.addEventListener('click', e => { if (e.target === overlay) closeModals(); });
    });

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    function showMsg(id, text, type) {
        const el = document.getElementById(id);
        el.textContent = text;
        el.className = 'form-msg ' + type;
    }

    function clearMsg(id) {
        const el = document.getElementById(id);
        el.textContent = '';
        el.className = 'form-msg';
    }

        if (!map) return; // Wait for Google Maps callback
        console.log('🚀 UniCondo booting...');
        await initAuth();
        await loadListings();
        console.log('✅ UniCondo ready!');
    }

    // boot() is called by initMap callback from Google Maps script
    </script>
