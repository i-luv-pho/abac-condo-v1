<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AbacCondo — Student Housing Near ABAC</title>
    <link rel="icon" type="image/png" sizes="64x64" href="favicon-64.png?v=3">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png?v=3">
    <link rel="apple-touch-icon" href="favicon.png">
    <meta name="theme-color" content="#FF5A5F">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="preconnect" href="https://pekqhcxbhtgfsqtiunic.supabase.co">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {  }
        
        :root {
            --coral: #FF5A5F;
            --coral-dark: #E04E53;
            --gradient: linear-gradient(135deg, #FF5A5F 0%, #FF8A6C 100%);
            --bg: #F7F7F7;
            --white: #FFFFFF;
            --text: #222222;
            --text-light: #717171;
            --border: #DDDDDD;
            --border-light: #EBEBEB;
            --radius: 12px;
            --shadow: 0 2px 8px rgba(0,0,0,0.1);
            --shadow-lg: 0 6px 20px rgba(0,0,0,0.15);
        }
        body {
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg); color: var(--text);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* ─── HEADER ─── */
        .header {
            background: white;
            padding: 0 24px;
            position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid var(--border-light);
            box-shadow: 0 1px 6px rgba(0,0,0,0.05);
        }
        .header-inner {
            max-width: 1400px; margin: 0 auto;
            display: flex; align-items: center; justify-content: space-between;
            height: 80px; position: relative;
        }
        .logo {
            display: flex; align-items: center; gap: 8px;
            text-decoration: none; color: var(--coral); flex-shrink: 0;
        }
        .logo-text {
            font-size: 18px; font-weight: 800; color: var(--coral);
            letter-spacing: -0.3px;
        }
        .nav {
            display: flex; gap: 4px;
            margin-left: 24px;
        }
        .nav a {
            color: var(--text-light); text-decoration: none;
            font-size: 15px; font-weight: 700; padding: 10px 20px;
            border-radius: 24px; transition: all 0.2s; white-space: nowrap;
            position: relative;
        }
        .nav a:hover { color: var(--text); }
        .nav a.active { color: var(--text); }
        .nav a.active::after {
            content: ''; position: absolute; bottom: 2px;
            left: 50%; transform: translateX(-50%);
            width: 24px; height: 2px; background: var(--text);
            border-radius: 1px;
        }
        .header-right {
            display: flex; align-items: center; gap: 12px; flex-shrink: 0;
        }
        .header-auth-btn {
            padding: 8px 16px; border-radius: 24px;
            border: 1.5px solid var(--border); background: white;
            font-size: 14px; font-weight: 700; cursor: pointer;
            font-family: inherit; transition: all 0.2s; color: var(--text);
        }
        .header-auth-btn:hover { border-color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .header-user {
            display: flex; align-items: center; gap: 8px;
        }
        .header-user-avatar {
            width: 32px; height: 32px; border-radius: 50%;
            background: var(--gradient); display: flex;
            align-items: center; justify-content: center;
        }
        .header-user-avatar svg { width: 16px; height: 16px; color: white; }
        .header-logout {
            padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
            background: white; font-size: 13px; font-weight: 700;
            cursor: pointer; font-family: inherit; color: var(--text); transition: all 0.2s;
        }
        .header-logout:hover { border-color: var(--text); }
        .hamburger {
            background: none; border: 1px solid var(--border);
            cursor: pointer; display: none;
            width: 42px; height: 42px; align-items: center;
            justify-content: center; border-radius: 50%;
            transition: all 0.2s;
        }
        .hamburger:hover { background: var(--bg); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .hamburger:active { transform: scale(0.92); }
        .hamburger svg { width: 18px; height: 18px; color: var(--text); }

        /* ─── SLIDE DRAWER ─── */
        .drawer-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.4);
            z-index: 200; opacity: 0; pointer-events: none;
            transition: opacity 0.3s; backdrop-filter: blur(4px);
        }
        .drawer-overlay.open { opacity: 1; pointer-events: auto; }
        .drawer {
            position: fixed; top: 0; right: -300px; width: 280px;
            height: 100vh; background: white; z-index: 201;
            box-shadow: -4px 0 20px rgba(0,0,0,0.15);
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column;
        }
        .drawer.open { right: 0; }
        .drawer-header {
            padding: 20px; display: flex; align-items: center;
            justify-content: space-between; border-bottom: 1px solid var(--border-light);
        }
        .drawer-header span { font-weight: 800; font-size: 18px; color: var(--text); }
        .drawer-close {
            background: none; border: none; cursor: pointer;
            width: 34px; height: 34px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        .drawer-close:hover { background: #f0f0f0; }
        .drawer-close svg { width: 20px; height: 20px; color: var(--text); }
        .drawer-nav { padding: 12px 16px; flex: 1; }
        .drawer-nav a {
            display: flex; align-items: center; gap: 12px;
            padding: 14px 16px; border-radius: 10px; text-decoration: none;
            color: var(--text); font-size: 15px; font-weight: 700;
            transition: background 0.2s;
        }
        .drawer-nav a:hover { background: #f5f5f5; }
        .drawer-nav a.active { background: #FFF0F0; color: var(--coral); }
        .drawer-nav a svg { width: 20px; height: 20px; opacity: 0.7; }
        .drawer-divider { height: 1px; background: var(--border-light); margin: 8px 16px; }
        .drawer-user {
            padding: 16px 20px; border-top: 1px solid var(--border-light);
        }
        .drawer-user-info {
            display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
        }
        .drawer-user-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: var(--gradient); display: flex;
            align-items: center; justify-content: center;
        }
        .drawer-user-avatar svg { width: 18px; height: 18px; color: white; }
        .drawer-user-name { font-weight: 700; font-size: 14px; }
        .drawer-user-email { font-size: 12px; color: var(--text-light); }
        .drawer-logout {
            width: 100%; padding: 10px; border-radius: 8px;
            border: 1.5px solid var(--border); background: white;
            font-size: 13px; font-weight: 700; color: var(--text);
            cursor: pointer; font-family: inherit; transition: all 0.2s;
        }
        .drawer-logout:hover { background: #f5f5f5; }
        .drawer-login {
            width: 100%; padding: 12px; border-radius: 10px;
            border: none; background: var(--gradient); color: white;
            font-size: 14px; font-weight: 700; cursor: pointer;
            font-family: inherit; transition: all 0.2s;
        }
        .drawer-login:hover { opacity: 0.9; }

        /* ─── SEARCH BAR (Airbnb-style capsule) ─── */
        .search-hero {
            background: var(--white);
            border-bottom: 1px solid var(--border-light);
            padding: 20px 24px;
        }
        .search-hero-inner {
            max-width: 1200px; margin: 0 auto;
        }
        .search-capsule {
            display: flex; align-items: center;
            background: white; border: 1px solid var(--border);
            border-radius: 40px; padding: 6px 6px 6px 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            transition: box-shadow 0.3s;
            max-width: 680px;
        }
        .search-capsule:focus-within {
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
            border-color: var(--border-light);
        }
        .search-capsule input {
            flex: 1; border: none; outline: none; background: none;
            font-size: 15px; font-family: inherit; color: var(--text);
            padding: 8px 0;
        }
        .search-capsule input::placeholder { color: var(--text-light); }
        .search-capsule-btn {
            width: 40px; height: 40px; border-radius: 50%;
            background: var(--gradient); border: none;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .search-capsule-btn:hover { transform: scale(1.05); box-shadow: 0 2px 8px rgba(255,90,95,0.4); }
        .search-capsule-btn svg { width: 16px; height: 16px; color: white; }

        /* ─── CATEGORY FILTERS (Airbnb-style icon row) ─── */
        .category-bar {
            display: flex; gap: 28px; margin-top: 16px; overflow-x: auto;
            scrollbar-width: none; -ms-overflow-style: none;
            padding-bottom: 2px;
        }
        .category-bar::-webkit-scrollbar { display: none; }
        .category-item {
            display: flex; flex-direction: column; align-items: center;
            gap: 6px; min-width: 50px; cursor: pointer;
            padding: 10px 4px 12px; border-bottom: 2px solid transparent;
            transition: all 0.15s; opacity: 0.6; flex-shrink: 0;
            background: none; border-top: none; border-left: none; border-right: none;
            font-family: inherit;
        }
        .category-item:hover { opacity: 1; }
        .category-item.active {
            opacity: 1; border-bottom-color: var(--text);
        }
        .category-icon {
            width: 24px; height: 24px; display: flex;
            align-items: center; justify-content: center;
        }
        .category-icon svg { width: 24px; height: 24px; color: var(--text); }
        .category-label {
            font-size: 11px; font-weight: 600; color: var(--text);
            white-space: nowrap; letter-spacing: 0.01em;
        }

        /* ─── GRID ─── */
        .grid-section {
            max-width: 1200px; margin: 0 auto;
            padding: 24px;
        }
        .grid-meta {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px;
        }
        .grid-meta h2 { font-size: 18px; font-weight: 800; }
        .grid-meta span { font-size: 13px; color: var(--text-light); font-weight: 600; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        /* ─── CARD ─── */
        .card {
            background: var(--white); border-radius: 14px;
            overflow: hidden; cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            position: relative;
        }
        .card:active { transform: scale(0.98); }
        .card-stagger {
            opacity: 0; transform: translateY(20px);
            animation: cardIn 0.4s ease-out forwards;
        }
        @keyframes cardIn {
            to { opacity: 1; transform: translateY(0); }
        }
        .card-img-wrap { overflow: hidden; position: relative; }
        .card-img {
            width: 100%; height: 200px; object-fit: cover;
            background: #E8E8E8;
            transition: transform 0.4s ease;
        }
        .card-body { padding: 14px 16px 16px; }
        .card-top {
            display: flex; justify-content: space-between; align-items: flex-start;
            margin-bottom: 2px;
        }
        .card-title {
            font-size: 16px; font-weight: 700;
            border-bottom: 1.5px solid transparent;
            transition: border-color 0.2s;
        }
        .card:hover .card-title { border-bottom-color: var(--text); }

        /* ─── HEART WISHLIST ─── */
        .card-heart {
            position: absolute; top: 10px; right: 10px;
            width: 32px; height: 32px;
            background: none; border: none; cursor: pointer;
            z-index: 10; padding: 0;
            display: flex; align-items: center; justify-content: center;
            filter: drop-shadow(0 1px 3px rgba(0,0,0,0.3));
            transition: transform 0.15s ease;
        }
        .card-heart:hover { transform: scale(1.15); }
        .card-heart:active { transform: scale(0.9); }
        .card-heart svg { width: 24px; height: 24px; }
        .card-heart .heart-outline { color: white; }
        .card-heart .heart-filled { color: #FF385C; display: none; }
        .card-heart.liked .heart-outline { display: none; }
        .card-heart.liked .heart-filled { display: block; }
        .card-heart.liked {
            animation: heartPop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes heartPop {
            0% { transform: scale(0.8); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        .card-rating {
            display: flex; align-items: center; gap: 3px;
            font-size: 13px; font-weight: 600; flex-shrink: 0;
        }
        .card-rating svg { width: 13px; height: 13px; color: var(--coral); }
        .card-distance { font-size: 14px; color: var(--text-light); }
        .card-details { font-size: 13px; color: var(--text-light); margin-top: 2px; }
        .card-price { font-size: 16px; font-weight: 800; margin-top: 6px; }
        .card-price span { font-weight: 500; font-size: 14px; color: var(--text-light); }
        .card-badge {
            position: absolute; top: 12px; left: 12px;
            background: var(--white); color: var(--text);
            font-size: 12px; font-weight: 700;
            padding: 5px 10px; border-radius: 6px;
            box-shadow: var(--shadow); z-index: 5;
        }
        .card-delete {
            position: absolute; top: 50px; right: 12px;
            background: white; border: 1px solid var(--border);
            color: var(--coral); font-size: 11px; font-weight: 700;
            padding: 4px 10px; border-radius: 6px; cursor: pointer;
            font-family: inherit; display: none;
            box-shadow: var(--shadow); z-index: 10;
        }
        .card-delete.show { display: block; }
        .card-delete:hover { background: var(--coral); color: white; border-color: var(--coral); }

        /* ─── POST FAB ─── */
        .post-btn {
            position: fixed; bottom: 24px; right: 24px;
            background: var(--gradient); color: white; border: none;
            padding: 14px 24px; border-radius: 28px; font-size: 15px;
            font-weight: 700; cursor: pointer; font-family: inherit;
            box-shadow: var(--shadow-lg); transition: transform 0.2s;
            z-index: 50; display: none;
        }
        .post-btn:hover { transform: scale(1.05); }
        .post-btn:active { transform: scale(0.95); }
        .post-btn.show {
            display: flex; align-items: center; gap: 8px;
            animation: fabIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes fabIn {
            from { opacity: 0; transform: scale(0.3) rotate(-15deg); }
            to { opacity: 1; transform: scale(1) rotate(0deg); }
        }
        .post-btn svg { width: 18px; height: 18px; }

        /* ─── MODAL ─── */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            z-index: 500; display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: white; border-radius: 16px; padding: 32px;
            width: 100%; max-width: 440px; box-shadow: 0 16px 48px rgba(0,0,0,0.2);
            animation: modalIn 0.25s ease-out;
            max-height: 90vh; overflow-y: auto;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: translateY(16px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 24px;
        }
        .modal-title { font-size: 20px; font-weight: 800; }
        .modal-close {
            background: none; border: none; font-size: 22px; cursor: pointer;
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s; color: var(--text);
        }
        .modal-close:hover { background: var(--bg); }
        .form-group { margin-bottom: 14px; }
        .form-group label {
            display: block; font-size: 13px; font-weight: 700;
            margin-bottom: 5px; color: var(--text);
        }
        .form-group input, .form-group select {
            width: 100%; padding: 11px 14px; border: 1.5px solid var(--border);
            border-radius: 8px; font-size: 14px; font-family: inherit;
            transition: border-color 0.2s; outline: none;
        }
        .form-group input:focus, .form-group select:focus { border-color: var(--coral); }
        .form-row { display: flex; gap: 10px; }
        .form-row .form-group { flex: 1; }
        .btn-submit {
            width: 100%; padding: 13px; background: var(--gradient);
            color: white; border: none; border-radius: 8px;
            font-size: 15px; font-weight: 700; cursor: pointer;
            font-family: inherit; transition: opacity 0.2s; margin-top: 4px;
        }
        .btn-submit:hover { opacity: 0.9; }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
        .form-msg {
            font-size: 13px; margin-top: 8px; font-weight: 600;
            display: none; text-align: center;
        }
        .form-msg.error { display: block; color: var(--coral); }
        .form-msg.success { display: block; color: #008A05; }
        .auth-switch {
            text-align: center; margin-top: 16px; font-size: 14px;
            color: var(--text-light);
        }
        .auth-switch a { color: var(--coral); font-weight: 700; text-decoration: none; cursor: pointer; }
        .auth-divider {
            display: flex; align-items: center; gap: 12px;
            margin: 18px 0; color: var(--text-light); font-size: 13px;
        }
        .auth-divider::before, .auth-divider::after {
            content: ''; flex: 1; height: 1px; background: var(--border);
        }
        .btn-google {
            width: 100%; padding: 12px; background: white;
            border: 1.5px solid var(--border); border-radius: 8px;
            font-size: 14px; font-weight: 600; cursor: pointer;
            font-family: inherit; display: flex; align-items: center;
            justify-content: center; gap: 10px; transition: all 0.2s; color: var(--text);
        }
        .btn-google:hover { background: #f8f8f8; border-color: #bbb; }
        .btn-google svg { width: 18px; height: 18px; }
        .spinner {
            display: inline-block; width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
            border-radius: 50%; animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ─── TOAST ─── */
        .toast {
            position: fixed; bottom: 80px; left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--text); color: white; padding: 12px 24px;
            border-radius: 12px; font-size: 14px; font-weight: 600;
            z-index: 999; opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        .empty-state { text-align: center; padding: 60px 24px; color: var(--text-light); }
        .empty-state p { font-size: 15px; margin-top: 8px; }

        /* ─── FOOTER ─── */
        .footer {
            text-align: center; padding: 32px 24px;
            color: var(--text-light); font-size: 13px;
            border-top: 1px solid var(--border-light); margin-top: 40px;
        }
        .footer a { color: var(--coral); text-decoration: none; font-weight: 600; }

        /* ─── SCROLL ANIMATIONS ─── */
        .fade-up {
            opacity: 0; transform: translateY(24px);
            transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .fade-up.visible { opacity: 1; transform: translateY(0); }

        /* ─── SKELETON LOADING ─── */
        .skeleton-card {
            background: var(--white); border-radius: 14px; overflow: hidden;
        }
        .skeleton-img {
            width: 100%; height: 200px; background: linear-gradient(90deg, #e8e8e8 25%, #f5f5f5 50%, #e8e8e8 75%);
            background-size: 200% 100%; animation: shimmer 1.5s infinite;
        }
        .skeleton-body { padding: 14px 16px 16px; }
        .skeleton-line {
            height: 12px; border-radius: 6px; margin-bottom: 8px;
            background: linear-gradient(90deg, #e8e8e8 25%, #f5f5f5 50%, #e8e8e8 75%);
            background-size: 200% 100%; animation: shimmer 1.5s infinite;
        }
        .skeleton-line.w60 { width: 60%; }
        .skeleton-line.w80 { width: 80%; }
        .skeleton-line.w40 { width: 40%; height: 16px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* ─── FORM FEEDBACK ─── */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }
        .shake { animation: shake 0.4s ease; }
        .success-check {
            display: inline-block; width: 40px; height: 40px; border-radius: 50%;
            background: #00C853; margin: 8px auto; position: relative;
        }
        .success-check::after {
            content: ''; position: absolute; left: 14px; top: 8px;
            width: 10px; height: 18px; border: 3px solid white;
            border-top: none; border-left: none;
            transform: rotate(45deg); animation: checkDraw 0.3s ease-out 0.1s both;
        }
        @keyframes checkDraw {
            0% { height: 0; width: 0; opacity: 0; }
            50% { height: 0; width: 10px; opacity: 1; }
            100% { height: 18px; width: 10px; opacity: 1; }
        }

        /* ─── BUTTON PRESS ─── */
        .btn-submit { transition: transform 0.15s, opacity 0.2s; }
        .btn-submit:active { transform: scale(0.97); }
        .header-auth-btn, .header-logout, .post-btn { transition: transform 0.15s, box-shadow 0.2s; }
        .header-auth-btn:active, .header-logout:active, .post-btn:active { transform: scale(0.95); }

        /* ─── DETAIL MODAL ─── */
        .detail-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.55);
            z-index: 600; display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
        }
        .detail-overlay.show { display: flex; }
        .detail-modal {
            background: white; border-radius: 18px; width: 100%; max-width: 520px;
            max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            animation: detailIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes detailIn {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .detail-img {
            width: 100%; height: 280px; object-fit: cover;
            border-radius: 18px 18px 0 0; background: #e8e8e8;
        }
        .detail-close {
            position: absolute; top: 16px; right: 16px;
            background: white; border: none; width: 36px; height: 36px;
            border-radius: 50%; font-size: 18px; cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2); display: flex;
            align-items: center; justify-content: center;
            transition: transform 0.2s; z-index: 2;
        }
        .detail-close:hover { transform: scale(1.1); }
        .detail-body { padding: 24px; }
        .detail-badge {
            display: inline-block; background: var(--coral); color: white;
            font-size: 11px; font-weight: 700; padding: 4px 10px;
            border-radius: 6px; margin-bottom: 8px;
        }
        .detail-title { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
        .detail-location { font-size: 15px; color: var(--text-light); margin-bottom: 12px; }
        .detail-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-top: 1px solid var(--border-light);
        }
        .detail-label { font-size: 14px; color: var(--text-light); font-weight: 600; }
        .detail-value { font-size: 14px; font-weight: 700; }
        .detail-price-big {
            font-size: 26px; font-weight: 800; color: var(--coral); margin: 16px 0 4px;
        }
        .detail-price-big span { font-size: 15px; font-weight: 500; color: var(--text-light); }
        .detail-actions { display: flex; gap: 10px; margin-top: 16px; }
        .detail-btn {
            flex: 1; padding: 13px; border-radius: 10px; font-size: 15px;
            font-weight: 700; cursor: pointer; font-family: inherit;
            text-align: center; text-decoration: none; transition: all 0.2s;
        }
        .detail-btn:active { transform: scale(0.97); }
        .detail-btn-primary { background: var(--gradient); color: white; border: none; }
        .detail-btn-secondary { background: white; color: var(--text); border: 1.5px solid var(--border); }
        .detail-btn-secondary:hover { border-color: var(--text); }
        @media (max-width: 600px) {
            .detail-modal { margin: 8px; max-height: 95vh; border-radius: 14px; }
            .detail-img { height: 220px; border-radius: 14px 14px 0 0; }
            .detail-body { padding: 18px; }
            .detail-title { font-size: 19px; }
            .detail-price-big { font-size: 22px; }
        }

        /* ─── DESKTOP 4-COL GRID ─── */
        @media (min-width: 1200px) {
            .grid { grid-template-columns: repeat(4, 1fr); gap: 24px; }
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 900px) {
            .search-hero h1 { font-size: 22px; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
        }

        /* ─── MOBILE ─── */
        @media (max-width: 768px) {
            .header { padding: 0 14px; }
            .header-inner { height: 56px; }
            .logo-text { font-size: 16px; }
            .nav { display: none; }
            .hamburger { display: flex; }
            .header-right { display: none; }

            .search-hero { padding: 16px 14px; }
            .search-hero h1 { font-size: 19px; margin-bottom: 2px; }
            .search-hero p { font-size: 13px; margin-bottom: 14px; }

            .grid { grid-template-columns: 1fr; gap: 16px; }
            .card-img { height: 180px; }

            .toast { font-size: 13px; padding: 10px 20px; bottom: 60px; }

            /* Detail modal — bottom sheet */
            .detail-overlay { align-items: flex-end; }
            .detail-modal {
                max-width: 100%; border-radius: 16px 16px 0 0;
                max-height: 88vh; animation: detailSlideUp 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            }
            @keyframes detailSlideUp {
                from { opacity: 0; transform: translateY(100%); }
                to { opacity: 1; transform: translateY(0); }
            }

            /* Show bottom nav, hide footer */
            .bottom-nav { display: flex; }
            .site-footer { display: none; }
            body { padding-bottom: calc(64px + env(safe-area-inset-bottom)); }
            .toast { bottom: calc(80px + env(safe-area-inset-bottom)); }
        }

        /* ─── BOTTOM NAV BAR (MOBILE ONLY) ─── */
        .bottom-nav {
            display: none; position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid var(--border-light);
            padding: 6px 0 calc(6px + env(safe-area-inset-bottom));
            z-index: 900; justify-content: space-around; align-items: center;
        }
        .bottom-nav-item {
            display: flex; flex-direction: column; align-items: center;
            text-decoration: none; color: var(--text-light); font-size: 10px;
            font-weight: 600; gap: 2px; padding: 4px 12px;
            transition: color 0.2s; -webkit-tap-highlight-color: transparent;
            min-width: 44px; min-height: 44px; justify-content: center;
        }
        .bottom-nav-item svg { width: 22px; height: 22px; }
        .bottom-nav-item.active { color: var(--coral); }
        .bottom-nav-item.post-tab {
            background: var(--gradient); color: white; border-radius: 50%;
            width: 48px; height: 48px; padding: 0; margin-top: -16px;
            box-shadow: 0 4px 12px rgba(255,90,95,0.35);
        }
        .bottom-nav-item.post-tab svg { width: 24px; height: 24px; }

        /* ─── SITE FOOTER (DESKTOP ONLY) ─── */
        .site-footer {
            background: var(--bg); border-top: 1px solid var(--border-light);
            padding: 24px; margin-top: 40px;
        }
        .site-footer-inner {
            max-width: 1400px; margin: 0 auto;
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 12px;
        }
        .site-footer-left {
            display: flex; align-items: center; gap: 6px;
            font-size: 14px; color: var(--text-light); font-weight: 600;
        }
        .site-footer-links { display: flex; gap: 20px; }
        .site-footer-links a {
            color: var(--text-light); text-decoration: none;
            font-size: 14px; font-weight: 600; transition: color 0.2s;
        }
        .site-footer-links a:hover { color: var(--text); text-decoration: underline; }

        /* ─── PULL TO REFRESH ─── */
        .ptr-indicator {
            position: fixed; top: 0; left: 50%;
            transform: translateX(-50%) translateY(0);
            z-index: 1000; opacity: 0;
            transition: transform 0.2s ease, opacity 0.2s ease;
            pointer-events: none;
        }
        .ptr-spinner {
            width: 32px; height: 32px; border-radius: 50%;
            border: 3px solid var(--border-light);
            border-top-color: var(--coral);
            margin: 8px;
        }
        .ptr-indicator.loading .ptr-spinner {
            animation: ptrSpin 0.6s linear infinite;
        }
        @keyframes ptrSpin { to { transform: rotate(360deg); } }

        /* ─── DRAG HANDLE ─── */
        .drag-handle {
            width: 36px; height: 5px; border-radius: 3px;
            background: var(--border); margin: 8px auto 4px;
        }
    </style>
</head>

                <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>

    <script>
    const SUPA_URL = 'https://pekqhcxbhtgfsqtiunic.supabase.co';
    const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBla3FoY3hiaHRnZnNxdGl1bmljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTkxMjMsImV4cCI6MjA5MDQzNTEyM30.YlEBAX2Oh5CKsSeVCS-UZq93np58xUUP0RlddISLgFY';

    let sb, currentUser = null, isSignUp = false, allListings = [], activeCategory = 'all';

    try {
        sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);
    } catch(e) { console.error('Supabase init failed:', e); }

    // ── AUTH ──
    async function initAuth() {
        const { data: { session } } = await sb.auth.getSession();
        currentUser = session?.user || null;
        updateHeaderUI();
        sb.auth.onAuthStateChange((_, session) => {
            currentUser = session?.user || null;
            updateHeaderUI();
            renderGrid(getFiltered());
        });
    }

    function toggleDrawer() {
        document.getElementById('drawer').classList.toggle('open');
        document.getElementById('drawerOverlay').classList.toggle('open');
    }

    function updateHeaderUI() {
        const el = document.getElementById('drawerUser');
        if (currentUser) {
            const name = currentUser.email.split('@')[0];
            el.innerHTML = `
                <div class="drawer-user-info">
                    <div class="drawer-user-avatar">
                        <svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm0 2c-3.87 0-7 2.24-7 5v1h14v-1c0-2.76-3.13-5-7-5z"/></svg>
                    </div>
                    <div>
                        <div class="drawer-user-name">${name}</div>
                        <div class="drawer-user-email">${currentUser.email}</div>
                    </div>
                </div>
                <button class="drawer-logout" onclick="handleLogout()">Log out</button>`;
        } else {
            el.innerHTML = `<button class="drawer-login" onclick="toggleDrawer(); openModal('auth')">Log in / Sign up</button>`;
        }
    }

    function toggleAuthMode() {
        isSignUp = !isSignUp;
        document.getElementById('authTitle').textContent = isSignUp ? 'Sign up' : 'Log in';
        document.getElementById('authBtn').textContent = isSignUp ? 'Create account' : 'Log in';
        document.getElementById('nameGroup').style.display = isSignUp ? 'block' : 'none';
        document.getElementById('authSwitch').innerHTML = isSignUp
            ? 'Already have an account? <a onclick="toggleAuthMode()">Log in</a>'
            : "Don't have an account? <a onclick=\"toggleAuthMode()\">Sign up</a>";
        document.getElementById('forgotLink').style.display = isSignUp ? 'none' : 'block';
        clearMsg('authMsg');
    }

    async function handleAuth(e) {
        e.preventDefault();
        const btn = document.getElementById('authBtn');
        const email = document.getElementById('authEmail').value;
        const password = document.getElementById('authPassword').value;
        btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>'; clearMsg('authMsg');
        try {
            if (isSignUp) {
                const name = document.getElementById('authName').value;
                const { error } = await sb.auth.signUp({ email, password, options: { data: { name } } });
                if (error) throw error;
                showMsg('authMsg', 'Account created!', 'success');
                setTimeout(() => { isSignUp = true; toggleAuthMode(); }, 1500);
            } else {
                const { error } = await sb.auth.signInWithPassword({ email, password });
                if (error) throw error;
                closeModals(); showToast('Welcome back!');
            }
        } catch (err) { showMsg('authMsg', err.message, 'error'); }
        btn.disabled = false; btn.textContent = isSignUp ? 'Create account' : 'Log in';
    }

    async function handleGoogleLogin() {
        try {
            const { error } = await sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin + '/index.html' } });
            if (error) throw error;
        } catch (err) { showMsg('authMsg', err.message, 'error'); }
    }

    async function handleResetPassword() {
        const email = document.getElementById('authEmail').value;
        if (!email) { showMsg('authMsg', 'Enter your email first', 'error'); return; }
        try {
            const { error } = await sb.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin + '/index.html'
            });
            if (error) throw error;
            showMsg('authMsg', 'Reset link sent! Check your email.', 'success');
        } catch (err) { showMsg('authMsg', err.message, 'error'); }
    }

    async function handleLogout() { await sb.auth.signOut(); showToast('Logged out'); }

    // ── SKELETON ──
    function showSkeleton() {
        const c = document.getElementById('gridContainer');
        c.innerHTML = Array(6).fill(`
            <div class="skeleton-card">
                <div class="skeleton-img"></div>
                <div class="skeleton-body">
                    <div class="skeleton-line w80"></div>
                    <div class="skeleton-line w60"></div>
                    <div class="skeleton-line w40"></div>
                </div>
            </div>`).join('');
    }

    // ── LISTINGS ──
    async function loadListings() {
        try {
            const { data, error } = await sb.from('listings').select('*').order('created_at', { ascending: false });
            if (error) throw error;
            allListings = data;
            renderGrid(data);
        } catch (e) {
            console.error('Load failed:', e);
            document.getElementById('gridContainer').innerHTML = '<div class="empty-state"><p>Failed to load.</p></div>';
        }
    }

    function getFiltered() {
        let list = [...allListings];
        const q = document.getElementById('searchInput').value.toLowerCase().trim();
        if (q) list = list.filter(l =>
            l.title.toLowerCase().includes(q) ||
            l.distance.toLowerCase().includes(q) ||
            l.details.toLowerCase().includes(q) ||
            String(l.price).includes(q)
        );
        return list;
    }

    function renderGrid(listings) {
        const container = document.getElementById('gridContainer');
        document.getElementById('gridCount').textContent = `${listings.length} listings`;

        if (!listings.length) {
            container.innerHTML = '<div class="empty-state"><p>No listings match your search.</p></div>';
            return;
        }
        container.innerHTML = listings.map((l, i) => `
            <div class="card card-stagger" data-id="${l.id}" style="animation-delay: ${i * 30}ms;" onclick="haptic('light'); window.location.href='listing.html?id=${l.id}'">
                ${l.badge ? `<span class="card-badge">${l.badge}</span>` : ''}
                <button class="card-heart" onclick="event.stopPropagation(); toggleHeart(this);" aria-label="Save">
                    <svg class="heart-outline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
                    <svg class="heart-filled" viewBox="0 0 24 24" fill="currentColor"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
                </button>
                <div class="card-img-wrap">
                    <img class="card-img" src="${l.image_url || ''}" alt="${l.title}" loading="lazy"
                        onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 300 200%22><rect fill=%22%23e8e8e8%22 width=%22300%22 height=%22200%22/><text x=%22150%22 y=%22105%22 text-anchor=%22middle%22 fill=%22%23bbb%22 font-size=%2216%22>No photo</text></svg>'">
                </div>
                <div class="card-body">
                    <div class="card-top">
                        <span class="card-title">${l.title}</span>
                        <span class="card-rating">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                            ${Number(l.rating).toFixed(1)}
                        </span>
                    </div>
                    <div class="card-distance">${l.distance}</div>
                    <div class="card-details">${l.details}</div>
                    <div class="card-price">฿${Number(l.price).toLocaleString()} <span>/month</span></div>
                </div>
            </div>
        `).join('');
        observeFadeIn();
    }

    function handleSearch() { renderGrid(getFiltered()); }

    // ── DETAIL MODAL ──
    function openDetail(id) {
        const l = allListings.find(x => x.id == id);
        if (!l) return;
        const img = document.getElementById('detailImg');
        img.src = l.image_url || '';
        img.onerror = function() { this.src = 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 520 280%22><rect fill=%22%23e8e8e8%22 width=%22520%22 height=%22280%22/><text x=%22260%22 y=%22145%22 text-anchor=%22middle%22 fill=%22%23bbb%22 font-size=%2218%22>No photo</text></svg>'; };
        const cat = { walking: '🚶 Walking distance', ride: '🛵 Short ride', budget: '💰 Budget' };
        document.getElementById('detailBody').innerHTML = `
            ${l.badge ? `<span class="detail-badge">${l.badge}</span>` : ''}
            <div class="detail-title">${l.title}</div>
            <div class="detail-location">${l.distance}</div>
            <div class="detail-price-big">฿${Number(l.price).toLocaleString()} <span>/month</span></div>
            <div class="detail-row">
                <span class="detail-label">Details</span>
                <span class="detail-value">${l.details}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Rating</span>
                <span class="detail-value">⭐ ${Number(l.rating).toFixed(1)}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Category</span>
                <span class="detail-value">${cat[l.category] || l.category}</span>
            </div>
            <div class="detail-actions">
                <a class="detail-btn detail-btn-primary" href="listing.html?id=${l.id}">
                    🔍 View Full Page
                </a>
                <a class="detail-btn detail-btn-secondary" href="https://www.google.com/maps/dir/?api=1&destination=${l.lat},${l.lng}" target="_blank" style="text-decoration:none;">
                    📍 Directions
                </a>
            </div>
        `;
        document.getElementById('detailOverlay').classList.add('show');
    }
    function closeDetail() { document.getElementById('detailOverlay').classList.remove('show'); }
    document.getElementById('detailOverlay').addEventListener('click', e => { if (e.target.id === 'detailOverlay') closeDetail(); });

    const ABAC_LAT = 13.6116, ABAC_LNG = 100.8363;
    function distToAbac(l) {
        const dlat = (l.lat || 0) - ABAC_LAT, dlng = (l.lng || 0) - ABAC_LNG;
        return Math.sqrt(dlat * dlat + dlng * dlng);
    }

    function sortBy(mode, el) {
        haptic('light');
        document.querySelectorAll('.category-item').forEach(p => p.classList.remove('active'));
        el.classList.add('active');
        let sorted = getFiltered();
        if (mode === 'price-low') sorted.sort((a, b) => a.price - b.price);
        else if (mode === 'price-high') sorted.sort((a, b) => b.price - a.price);
        else if (mode === 'nearest') sorted.sort((a, b) => distToAbac(a) - distToAbac(b));
        else if (mode === 'walking') sorted = sorted.filter(l => l.category === 'walking');
        else if (mode === 'ride') sorted = sorted.filter(l => l.category === 'ride');
        else if (mode === 'top-rated') sorted.sort((a, b) => (b.rating || 0) - (a.rating || 0));
        renderGrid(sorted);
    }



    // ── MODALS & UTILS ──
    function openModal(type) {
        haptic('medium');
        closeModals();
        if (type === 'auth') { isSignUp = false; toggleAuthMode(); toggleAuthMode(); document.getElementById('authModal').classList.add('show'); }
    }
    function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('show')); }
    document.querySelectorAll('.modal-overlay').forEach(o => { o.addEventListener('click', e => { if (e.target === o) closeModals(); }); });

    function showToast(msg) {
        haptic('light');
        const t = document.getElementById('toast');
        t.textContent = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }
    function showMsg(id, text, type) { const el = document.getElementById(id); el.textContent = text; el.className = 'form-msg ' + type; }
    function clearMsg(id) { const el = document.getElementById(id); el.textContent = ''; el.className = 'form-msg'; }

    // ── SCROLL OBSERVER ──
    function observeFadeIn() {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
        }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
        document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));
    }

    // ── HAPTIC FEEDBACK ──
    function haptic(type) {
        if (!navigator.vibrate) return;
        const patterns = {
            light: 8,
            medium: 20,
            heavy: 40,
            success: [10, 40, 15],
            error: [30, 50, 30, 50, 30],
            selection: 5,
            heart: [8, 30, 12]
        };
        try { navigator.vibrate(patterns[type] || 8); } catch(e) {}
    }

    // ── HEART TOGGLE ──
    function toggleHeart(btn) {
        btn.classList.toggle('liked');
        haptic('heart');
    }

    // Header shrink removed — was causing nav jump

    // ── PULL TO REFRESH (MOBILE) ──
    (function() {
        let startY = 0, pulling = false;
        const threshold = 80;
        let indicator = document.createElement('div');
        indicator.className = 'ptr-indicator';
        indicator.innerHTML = '<div class="ptr-spinner"></div>';
        document.body.prepend(indicator);

        document.addEventListener('touchstart', e => {
            if (window.scrollY === 0 && !document.querySelector('.modal-overlay.show')) {
                startY = e.touches[0].clientY; pulling = true;
            }
        }, { passive: true });
        document.addEventListener('touchmove', e => {
            if (!pulling) return;
            const dy = e.touches[0].clientY - startY;
            if (dy > 0 && dy < 150) {
                indicator.style.transform = `translateX(-50%) translateY(${Math.min(dy, threshold)}px)`;
                indicator.style.opacity = Math.min(dy / threshold, 1);
            }
        }, { passive: true });
        document.addEventListener('touchend', () => {
            if (!pulling) return;
            pulling = false;
            const op = parseFloat(indicator.style.opacity || 0);
            if (op >= 1) {
                haptic('medium');
                indicator.classList.add('loading');
                loadListings().then(() => {
                    indicator.classList.remove('loading');
                    indicator.style.transform = 'translateX(-50%) translateY(0)';
                    indicator.style.opacity = 0;
                    showToast('Refreshed!');
                });
            } else {
                indicator.style.transform = 'translateX(-50%) translateY(0)';
                indicator.style.opacity = 0;
            }
        });
    })();

    // ── SWIPE TO DISMISS BOTTOM SHEET ──
    (function() {
        const overlay = document.querySelector('.detail-overlay');
        if (!overlay) return;
        const modal = overlay.querySelector('.detail-modal');
        if (!modal) return;
        // Add drag handle
        const handle = document.createElement('div');
        handle.className = 'drag-handle';
        modal.prepend(handle);

        let startY = 0, currentY = 0, dragging = false;
        modal.addEventListener('touchstart', e => {
            if (e.target.closest('.detail-actions, a, button')) return;
            startY = e.touches[0].clientY; dragging = true; currentY = 0;
            modal.style.transition = 'none';
        }, { passive: true });
        modal.addEventListener('touchmove', e => {
            if (!dragging) return;
            currentY = e.touches[0].clientY - startY;
            if (currentY > 0) {
                modal.style.transform = `translateY(${currentY}px)`;
                overlay.style.background = `rgba(0,0,0,${0.55 * (1 - currentY / 400)})`;
            }
        }, { passive: true });
        modal.addEventListener('touchend', () => {
            if (!dragging) return; dragging = false;
            modal.style.transition = 'transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94)';
            if (currentY > modal.offsetHeight * 0.3) {
                haptic('light');
                modal.style.transform = 'translateY(100%)';
                setTimeout(() => {
                    overlay.classList.remove('show');
                    modal.style.transform = '';
                    overlay.style.background = '';
                }, 300);
            } else {
                modal.style.transform = 'translateY(0)';
                overlay.style.background = '';
            }
        });
    })();

    // ── BOOT ──
    async function boot() {
        showSkeleton();
        await initAuth();
        await loadListings();
    }
    boot();
    </script>
