<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Profile | AbacCondo</title>

    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png?v=3">
    <link rel="apple-touch-icon" href="favicon.png">
    <meta name="theme-color" content="#FF5A5F">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="preconnect" href="https://pekqhcxbhtgfsqtiunic.supabase.co">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --coral: #FF5A5F; --coral-dark: #E04E53;
            --gradient: linear-gradient(135deg, #FF5A5F 0%, #FF8A6C 100%);
            --bg: #F7F7F7; --white: #FFFFFF; --text: #222222;
            --text-light: #717171; --border: #DDDDDD;
            --border-light: #EBEBEB; --radius: 12px;
            --shadow: 0 2px 8px rgba(0,0,0,0.1);
            --shadow-lg: 0 6px 20px rgba(0,0,0,0.15);
        }
        html { scroll-behavior: smooth; }
        
        body {
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg); color: var(--text);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            
        }

        /* ─── HEADER ─── */
        .header { background: white; padding: 0 24px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border-light); box-shadow: 0 1px 6px rgba(0,0,0,0.05); }
        .header-inner {
            max-width: 1400px; margin: 0 auto;
            display: flex; align-items: center; justify-content: space-between; height: 80px;
        }
        .logo { display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--coral); flex-shrink: 0; }
        .nav { display: flex; gap: 4px; flex: 1; min-width: 0; margin-left: 24px; }
        .nav a { color: var(--text-light); text-decoration: none; font-size: 15px; font-weight: 700; padding: 10px 16px; border-radius: 24px; transition: all 0.2s; white-space: nowrap; }
        .nav a:hover { background: var(--bg); color: var(--text); }
        .nav a.active { color: var(--text); background: var(--bg); }
        .hamburger { background: none; border: 1px solid var(--border); cursor: pointer; width: 42px; height: 42px; display: none; align-items: center; justify-content: center; border-radius: 50%; transition: all 0.2s; }
        .hamburger:hover { background: var(--bg); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .hamburger:active { transform: scale(0.92); }
        .hamburger svg { width: 18px; height: 18px; color: var(--text); }
        .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.3s; backdrop-filter: blur(4px); }
        .drawer-overlay.open { opacity: 1; pointer-events: auto; }
        .drawer { position: fixed; top: 0; right: -300px; width: 280px; height: 100vh; background: white; z-index: 201; box-shadow: -4px 0 20px rgba(0,0,0,0.15); transition: right 0.3s cubic-bezier(0.4,0,0.2,1); display: flex; flex-direction: column; }
        .drawer.open { right: 0; }
        .drawer-header { padding: 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border-light); }
        .drawer-header span { font-weight: 800; font-size: 18px; color: var(--text); }
        .drawer-close { background: none; border: none; cursor: pointer; width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        .drawer-close:hover { background: #f0f0f0; }
        .drawer-close svg { width: 20px; height: 20px; color: var(--text); }
        .drawer-nav { padding: 12px 16px; flex: 1; }
        .drawer-nav a { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: 10px; text-decoration: none; color: var(--text); font-size: 15px; font-weight: 700; transition: background 0.2s; }
        .drawer-nav a:hover { background: #f5f5f5; }
        .drawer-nav a.active { background: #FFF0F0; color: var(--coral); }
        .drawer-nav a svg { width: 20px; height: 20px; opacity: 0.7; }
        .drawer-divider { height: 1px; background: var(--border-light); margin: 8px 16px; }
        .drawer-user { padding: 16px 20px; border-top: 1px solid var(--border-light); }
        .drawer-user-info { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .drawer-user-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--gradient); display: flex; align-items: center; justify-content: center; }
        .drawer-user-avatar svg { width: 18px; height: 18px; color: white; }
        .drawer-user-name { font-weight: 700; font-size: 14px; }
        .drawer-user-email { font-size: 12px; color: var(--text-light); }
        .drawer-logout { width: 100%; padding: 10px; border-radius: 8px; border: 1.5px solid var(--border); background: white; font-size: 13px; font-weight: 700; color: var(--text); cursor: pointer; font-family: inherit; transition: all 0.2s; }
        .drawer-logout:hover { background: #f5f5f5; }
        .drawer-login { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--gradient); color: white; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }
        .drawer-login:hover { opacity: 0.9; }

        /* ─── MAIN CONTAINER ─── */
        .container { max-width: 900px; margin: 0 auto; padding: 32px 24px; }

        /* ─── PROFILE HERO ─── */
        .profile-hero {
            background: var(--white); border-radius: 16px;
            padding: 32px; margin-bottom: 24px;
            box-shadow: var(--shadow);
            display: flex; align-items: center; gap: 24px;
        }
        .profile-avatar {
            width: 80px; height: 80px; border-radius: 50%;
            background: var(--gradient); display: flex;
            align-items: center; justify-content: center;
            font-size: 32px; color: white; font-weight: 800;
            flex-shrink: 0;
        }
        .profile-info h1 { font-size: 24px; font-weight: 800; margin-bottom: 2px; }
        .profile-info p { color: var(--text-light); font-size: 14px; }
        .profile-info .joined { font-size: 12px; color: var(--text-light); margin-top: 4px; }

        /* ─── STATS ─── */
        .stats {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--white); border-radius: 12px;
            padding: 20px; text-align: center;
            box-shadow: var(--shadow);
        }
        .stat-number { font-size: 28px; font-weight: 800; color: var(--coral); }
        .stat-label { font-size: 13px; color: var(--text-light); font-weight: 600; margin-top: 4px; }

        /* ─── SECTIONS ─── */
        .section {
            background: var(--white); border-radius: 16px;
            padding: 24px; margin-bottom: 24px;
            box-shadow: var(--shadow);
        }
        .section-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 16px;
        }
        .section-title { font-size: 18px; font-weight: 800; }

        /* ─── MY LISTING ROW ─── */
        .my-listing {
            display: flex; gap: 14px; padding: 14px 0;
            border-bottom: 1px solid var(--border-light);
            align-items: center;
        }
        .my-listing:last-child { border-bottom: none; }
        .my-listing-img {
            width: 80px; height: 60px; border-radius: 8px;
            object-fit: cover; background: #e8e8e8; flex-shrink: 0;
        }
        .my-listing-info { flex: 1; }
        .my-listing-title { font-size: 15px; font-weight: 700; }
        .my-listing-meta { font-size: 13px; color: var(--text-light); }
        .my-listing-price { font-size: 15px; font-weight: 800; flex-shrink: 0; }
        .my-listing-actions { display: flex; gap: 8px; flex-shrink: 0; }
        .btn-sm {
            padding: 5px 12px; border-radius: 6px; font-size: 12px;
            font-weight: 700; cursor: pointer; font-family: inherit;
            transition: all 0.2s; border: 1px solid var(--border);
            background: white; color: var(--text);
        }
        .btn-sm:hover { border-color: var(--text); }
        .btn-sm.danger { color: var(--coral); }
        .btn-sm.danger:hover { background: var(--coral); color: white; border-color: var(--coral); }
        .btn-sm.edit { color: #2563EB; }
        .btn-sm.edit:hover { background: #2563EB; color: white; border-color: #2563EB; }

        /* ─── EDIT MODAL ─── */
        .edit-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            z-index: 500; display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(6px);
        }
        .edit-overlay.show { display: flex; }
        .edit-modal {
            background: white; border-radius: 16px; width: 100%; max-width: 480px;
            max-height: 90vh; overflow-y: auto; padding: 28px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            animation: editIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes editIn { from { opacity:0; transform:translateY(20px) scale(0.95); } to { opacity:1; transform:translateY(0) scale(1); } }
        .edit-modal h3 { font-size: 20px; font-weight: 800; margin-bottom: 16px; }
        .edit-field { margin-bottom: 14px; }
        .edit-field label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 4px; color: var(--text); }
        .edit-field input, .edit-field select {
            width: 100%; padding: 10px 14px; border: 1.5px solid var(--border);
            border-radius: 8px; font-size: 14px; font-family: inherit; outline: none;
            transition: border-color 0.2s;
        }
        .edit-field input:focus, .edit-field select:focus { border-color: var(--coral); }
        .edit-actions { display: flex; gap: 10px; margin-top: 20px; }
        .edit-actions button {
            flex: 1; padding: 12px; border-radius: 10px; font-size: 15px;
            font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.2s;
        }
        .edit-actions button:active { transform: scale(0.97); }
        .edit-save { background: var(--gradient); color: white; border: none; }
        .edit-cancel { background: white; color: var(--text); border: 1.5px solid var(--border); }
        .edit-msg { font-size: 13px; margin-top: 8px; text-align: center; }

        /* ─── SETTINGS ROWS ─── */
        .setting-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 0; border-bottom: 1px solid var(--border-light);
        }
        .setting-row:last-child { border-bottom: none; }
        .setting-label { font-size: 14px; font-weight: 600; }
        .setting-value { font-size: 14px; color: var(--text-light); text-align: right; }
        .setting-btn {
            padding: 6px 14px; border-radius: 20px; font-size: 12px;
            font-weight: 700; cursor: pointer; font-family: inherit;
            transition: all 0.2s; background: white;
            border: 1.5px solid var(--border); color: var(--text);
        }
        .setting-btn:hover { border-color: var(--text); }
        .setting-btn.danger { color: var(--coral); border-color: var(--coral); }
        .setting-btn.danger:hover { background: var(--coral); color: white; }

        /* ─── LOGIN PROMPT ─── */
        .login-prompt {
            text-align: center; padding: 80px 24px;
        }
        .login-prompt h2 { font-size: 24px; margin-bottom: 8px; }
        .login-prompt p { color: var(--text-light); margin-bottom: 24px; }
        .login-prompt .btn-login {
            background: var(--gradient); color: white; border: none;
            padding: 14px 32px; border-radius: 10px; font-size: 16px;
            font-weight: 700; cursor: pointer; font-family: inherit;
        }

        /* ─── TOAST ─── */
        .toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            background: var(--text); color: white; padding: 12px 24px;
            border-radius: 8px; font-size: 14px; font-weight: 600;
            z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        .toast.show { opacity: 1; }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 700px) {
            .header { padding: 0 10px; }
            .header-inner { height: 52px; gap: 8px; }
            .logo svg { width: 20px; height: 20px; }
            .logo-text { font-size: 15px; }
            .nav { gap: 0; }
            .nav a { font-size: 11px; padding: 5px 6px; border-radius: 6px; white-space: nowrap; }
            .header-logout { padding: 4px 8px; font-size: 10px; white-space: nowrap; }
            .header-right { gap: 6px; }
            .header-user-avatar { width: 26px; height: 26px; }

            .container { padding: 12px; }
            .profile-hero { flex-direction: column; text-align: center; padding: 20px; gap: 14px; border-radius: 14px; margin-bottom: 14px; }
            .profile-avatar { width: 56px; height: 56px; font-size: 22px; }
            .profile-info h1 { font-size: 18px; }
            .profile-info p { font-size: 13px; }
            .profile-info .joined { font-size: 11px; }

            .stats { gap: 8px; margin-bottom: 14px; }
            .stat-card { padding: 12px 8px; border-radius: 10px; }
            .stat-number { font-size: 20px; }
            .stat-label { font-size: 11px; }

            .section { padding: 16px; border-radius: 14px; margin-bottom: 14px; }
            .section-title { font-size: 16px; }
            .my-listing { flex-wrap: wrap; gap: 10px; padding: 12px 0; }
            .my-listing-img { width: 70px; height: 50px; border-radius: 6px; }
            .my-listing-title { font-size: 14px; }
            .my-listing-meta { font-size: 12px; }
            .my-listing-price { font-size: 14px; width: auto; }
            .my-listing-actions { width: auto; }
            .btn-sm { padding: 4px 10px; font-size: 11px; }

            .setting-row { padding: 10px 0; }
            .setting-label { font-size: 13px; }
            .setting-value { font-size: 13px; }
            .setting-btn { padding: 5px 12px; font-size: 11px; }

            .login-prompt { padding: 60px 20px; }
            .login-prompt h2 { font-size: 20px; }
            .login-prompt p { font-size: 14px; }
            .login-prompt .btn-login { padding: 12px 28px; font-size: 15px; }

            .toast { font-size: 13px; padding: 10px 20px; }
        }

        /* ─── BOTTOM NAV BAR (MOBILE) ─── */
        .bottom-nav {
            display: none; position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(255,255,255,0.92); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid var(--border-light);
            padding: 6px 0 calc(6px + env(safe-area-inset-bottom));
            z-index: 900; justify-content: space-around; align-items: center;
        }
        .bottom-nav-item {
            display: flex; flex-direction: column; align-items: center;
            text-decoration: none; color: var(--text-light); font-size: 10px;
            font-weight: 600; gap: 2px; padding: 4px 12px;
            transition: color 0.2s; -webkit-tap-highlight-color: transparent;
            min-width: 44px; min-height: 44px; justify-content: center;
        }
        .bottom-nav-item svg { width: 22px; height: 22px; }
        .bottom-nav-item.active { color: var(--coral); }
        .bottom-nav-item.post-tab {
            background: var(--gradient); color: white; border-radius: 50%;
            width: 48px; height: 48px; padding: 0; margin-top: -16px;
            box-shadow: 0 4px 12px rgba(255,90,95,0.35);
        }
        .bottom-nav-item.post-tab svg { width: 24px; height: 24px; }
        @media (max-width: 600px) {
            .bottom-nav { display: flex; }
            .nav { display: none; }
            body { padding-bottom: calc(64px + env(safe-area-inset-bottom)); }
            .toast { bottom: calc(80px + env(safe-area-inset-bottom)); }
        }
    </style>
</head>

            <a href="explore.html"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l5.447 2.724A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/></svg>Explore Map</a>

    <!-- CONTENT -->
    <div class="container" id="pageContent">
        <!-- Filled by JS -->
    </div>

    <div class="toast" id="toast"></div>

    <!-- EDIT MODAL -->
    <div class="edit-overlay" id="editOverlay">
        <div class="edit-modal">
            <h3>✏️ Edit Listing</h3>
            <form id="editForm" onsubmit="saveEdit(event)">
                <input type="hidden" id="editId">
                <div class="edit-field">
                    <label>Title</label>
                    <input type="text" id="editTitle" required>
                </div>
                <div class="edit-field">
                    <label>Price (฿/month)</label>
                    <input type="number" id="editPrice" required>
                </div>
                <div class="edit-field">
                    <label>Distance</label>
                    <input type="text" id="editDistance" required>
                </div>
                <div class="edit-field">
                    <label>Details</label>
                    <input type="text" id="editDetails" required>
                </div>
                <div class="edit-field">
                    <label>Rating</label>
                    <input type="number" id="editRating" step="0.1" min="0" max="5">
                </div>
                <div class="edit-field">
                    <label>Phone Number (optional)</label>
                    <input type="tel" id="editPhone" placeholder="e.g. 085-870-4317">
                </div>
                <div class="edit-field">
                    <label>Category</label>
                    <select id="editCategory">
                        <option value="walking">Walking distance</option>
                        <option value="ride">Short ride</option>
                        <option value="budget">Budget</option>
                    </select>
                </div>
                <div class="edit-field">
                    <label>Image URL</label>
                    <input type="url" id="editImage">
                </div>
                <div class="edit-msg" id="editMsg"></div>
                <div class="edit-actions">
                    <button type="button" class="edit-cancel" onclick="closeEdit()">Cancel</button>
                    <button type="submit" class="edit-save" id="editSaveBtn">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script>
    const SUPA_URL = 'https://pekqhcxbhtgfsqtiunic.supabase.co';
    const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBla3FoY3hiaHRnZnNxdGl1bmljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTkxMjMsImV4cCI6MjA5MDQzNTEyM30.YlEBAX2Oh5CKsSeVCS-UZq93np58xUUP0RlddISLgFY';

    let sb, currentUser = null;

    try { sb = window.supabase.createClient(SUPA_URL, SUPA_KEY); } catch(e) {}

    async function boot() {
        const { data: { session } } = await sb.auth.getSession();
        currentUser = session?.user || null;
        updateHeaderUI();
        if (currentUser) {
            await loadProfile();
        } else {
            showLoginPrompt();
        }
        sb.auth.onAuthStateChange((_, session) => {
            currentUser = session?.user || null;
            updateHeaderUI();
            if (currentUser) loadProfile();
            else showLoginPrompt();
        });
    }

    function toggleDrawer() {
        document.getElementById('drawer').classList.toggle('open');
        document.getElementById('drawerOverlay').classList.toggle('open');
    }
    function updateHeaderUI() {
        const el = document.getElementById('drawerUser');
        if (currentUser) {
            const name = currentUser.email.split('@')[0];
            el.innerHTML = `<div class="drawer-user-info"><div class="drawer-user-avatar"><svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm0 2c-3.87 0-7 2.24-7 5v1h14v-1c0-2.76-3.13-5-7-5z"/></svg></div><div><div class="drawer-user-name">${name}</div><div class="drawer-user-email">${currentUser.email}</div></div></div><button class="drawer-logout" onclick="handleLogout()">Log out</button>`;
        } else {
            el.innerHTML = `<button class="drawer-login" onclick="window.location.href='index.html'">Log in / Sign up</button>`;
        }
    }

    function showLoginPrompt() {
        document.getElementById('pageContent').innerHTML = `
            <div class="login-prompt">
                <h2>Welcome to AbacCondo</h2>
                <p>Log in to view your profile and manage your listings</p>
                <a href="index.html" class="btn-login" style="text-decoration:none; display:inline-block;">Go to Login</a>
            </div>`;
    }

    async function loadProfile() {
        const page = document.getElementById('pageContent');
        const name = currentUser.user_metadata?.name || currentUser.email.split('@')[0];
        const initial = name.charAt(0).toUpperCase();
        const joined = new Date(currentUser.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'long' });

        // Load user's listings
        const { data: listings, error } = await sb
            .from('listings')
            .select('*')
            .eq('user_id', currentUser.id)
            .order('created_at', { ascending: false });

        const myListings = listings || [];
        allMyListings = myListings;
        const totalViews = myListings.length * 42; // placeholder

        page.innerHTML = `
            <!-- PROFILE HERO -->
            <div class="profile-hero">
                <div class="profile-avatar">${initial}</div>
                <div class="profile-info">
                    <h1>${name}</h1>
                    <p>${currentUser.email}</p>
                    <div class="joined">📅 Joined ${joined}</div>
                </div>
            </div>

            <!-- STATS -->
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-number">${myListings.length}</div>
                    <div class="stat-label">Listings</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${totalViews}</div>
                    <div class="stat-label">Total Views</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${myListings.length > 0 ? '⭐' : '—'}</div>
                    <div class="stat-label">Status</div>
                </div>
            </div>

            <!-- MY LISTINGS -->
            <div class="section">
                <div class="section-header">
                    <span class="section-title">My Listings</span>
                    <a href="explore.html" style="color:var(--coral); font-size:13px; font-weight:700; text-decoration:none;">View all →</a>
                </div>
                ${myListings.length === 0
                    ? '<p style="color:var(--text-light); font-size:14px; padding:16px 0;">You haven\'t posted any listings yet.</p>'
                    : myListings.map(l => `
                    <div class="my-listing">
                        <img class="my-listing-img" src="${l.image_url || ''}" alt="${l.title}"
                            onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 80 60%22><rect fill=%22%23e8e8e8%22 width=%2280%22 height=%2260%22/></svg>'">
                        <div class="my-listing-info">
                            <div class="my-listing-title">${l.title}</div>
                            <div class="my-listing-meta">${l.distance} · ${l.details}</div>
                        </div>
                        <div class="my-listing-price">฿${Number(l.price).toLocaleString()}</div>
                        <div class="my-listing-actions">
                            <button class="btn-sm edit" onclick="openEdit('${l.id}')">Edit</button>
                            <button class="btn-sm danger" onclick="deleteListing('${l.id}')">Delete</button>
                        </div>
                    </div>`).join('')
                }
            </div>

            <!-- ACCOUNT SETTINGS -->
            <div class="section">
                <div class="section-header">
                    <span class="section-title">Account Settings</span>
                </div>
                <div class="setting-row">
                    <span class="setting-label">Email</span>
                    <span class="setting-value">${currentUser.email}</span>
                </div>
                <div class="setting-row">
                    <span class="setting-label">Display Name</span>
                    <span class="setting-value">${name}</span>
                </div>
                <div class="setting-row">
                    <span class="setting-label">Auth Provider</span>
                    <span class="setting-value">${currentUser.app_metadata?.provider || 'email'}</span>
                </div>
                <div class="setting-row">
                    <span class="setting-label">User ID</span>
                    <span class="setting-value" style="font-size:11px; font-family:monospace; max-width:200px; overflow:hidden; text-overflow:ellipsis;">${currentUser.id}</span>
                </div>
            </div>

            <!-- PREFERENCES -->
            <div class="section">
                <div class="section-header">
                    <span class="section-title">Preferences</span>
                </div>
                <div class="setting-row">
                    <span class="setting-label">Email Notifications</span>
                    <button class="setting-btn" onclick="showToast('Coming soon!')">Configure</button>
                </div>
                <div class="setting-row">
                    <span class="setting-label">Language</span>
                    <span class="setting-value">English</span>
                </div>
                <div class="setting-row">
                    <span class="setting-label">Currency</span>
                    <span class="setting-value">฿ THB</span>
                </div>
            </div>

            <!-- DANGER ZONE -->
            <div class="section" style="border: 1.5px solid var(--coral);">
                <div class="section-header">
                    <span class="section-title" style="color: var(--coral);">Danger Zone</span>
                </div>
                <div class="setting-row">
                    <div>
                        <span class="setting-label">Log out</span>
                        <div style="font-size:12px; color:var(--text-light);">Sign out of your account on this device</div>
                    </div>
                    <button class="setting-btn" onclick="handleLogout()">Log out</button>
                </div>
                <div class="setting-row">
                    <div>
                        <span class="setting-label" style="color:var(--coral);">Delete Account</span>
                        <div style="font-size:12px; color:var(--text-light);">Permanently delete your account and all data</div>
                    </div>
                    <button class="setting-btn danger" onclick="showToast('Contact support to delete your account')">Delete</button>
                </div>
            </div>
        `;
    }

    async function deleteListing(id) {
        if (!confirm('Delete this listing?')) return;
        try {
            const { error } = await sb.from('listings').delete().eq('id', id);
            if (error) throw error;
            showToast('Listing deleted');
            loadProfile();
        } catch (err) { showToast('Error: ' + err.message); }
    }

    async function handleLogout() {
        await sb.auth.signOut();
        showToast('Logged out');
        setTimeout(() => window.location.href = 'index.html', 1000);
    }

    let allMyListings = [];

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    // ── EDIT ──
    function openEdit(id) {
        const l = allMyListings.find(x => x.id === id);
        if (!l) return;
        document.getElementById('editId').value = l.id;
        document.getElementById('editTitle').value = l.title;
        document.getElementById('editPrice').value = l.price;
        document.getElementById('editDistance').value = l.distance;
        document.getElementById('editDetails').value = l.details;
        document.getElementById('editRating').value = l.rating;
        document.getElementById('editPhone').value = l.phone || '';
        document.getElementById('editCategory').value = l.category;
        document.getElementById('editImage').value = l.image_url || '';
        document.getElementById('editMsg').textContent = '';
        document.getElementById('editOverlay').classList.add('show');
    }

    function closeEdit() { document.getElementById('editOverlay').classList.remove('show'); }
    document.getElementById('editOverlay').addEventListener('click', e => { if (e.target.id === 'editOverlay') closeEdit(); });

    async function saveEdit(e) {
        e.preventDefault();
        const btn = document.getElementById('editSaveBtn');
        const id = document.getElementById('editId').value;
        btn.disabled = true; btn.textContent = 'Saving...';
        try {
            const updates = {
                title: document.getElementById('editTitle').value,
                price: parseInt(document.getElementById('editPrice').value),
                distance: document.getElementById('editDistance').value,
                details: document.getElementById('editDetails').value,
                rating: parseFloat(document.getElementById('editRating').value) || 5.0,
                category: document.getElementById('editCategory').value,
                image_url: document.getElementById('editImage').value || null,
            };
            // Try phone if column exists
            const phone = document.getElementById('editPhone').value;
            if (phone) updates.phone = phone;

            const { error } = await sb.from('listings').update(updates).eq('id', id);
            if (error) throw error;
            closeEdit();
            showToast('Listing updated!');
            loadProfile();
        } catch (err) {
            document.getElementById('editMsg').textContent = err.message;
            document.getElementById('editMsg').style.color = 'var(--coral)';
        }
        btn.disabled = false; btn.textContent = 'Save Changes';
    }

    // ── HAPTIC FEEDBACK ──
    function haptic(type) {
        if (!navigator.vibrate) return;
        const patterns = { light: 10, medium: 25, success: [10, 50, 20], error: [30, 50, 30] };
        try { navigator.vibrate(patterns[type] || 10); } catch(e) {}
    }
    document.querySelectorAll('.header-logout, .btn-edit, .tab-btn').forEach(el => {
        el.addEventListener('click', () => haptic('light'));
    });

    // Staggered profile section entrance
    document.querySelectorAll('.profile-card, .tab-btn, .listings-section').forEach((el, i) => {
        el.style.opacity = '0';
        el.style.transform = 'translateY(16px)';
        el.style.transition = `opacity 0.4s ease ${i * 100}ms, transform 0.4s ease ${i * 100}ms`;
        requestAnimationFrame(() => { el.style.opacity = '1'; el.style.transform = 'translateY(0)'; });
    });

    boot();
    </script>

        </a>

        </a>

            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
