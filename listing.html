<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Listing | AbacCondo</title>
    <link rel="icon" type="image/png" sizes="64x64" href="favicon-64.png?v=3">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png?v=3">
    <link rel="apple-touch-icon" href="favicon.png">
    <meta name="theme-color" content="#FF5A5F">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="preconnect" href="https://pekqhcxbhtgfsqtiunic.supabase.co">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBfbugmOoOnX9f_wL8RzgttgqP76J6g-gY" async defer></script>
    <style>
        html { scroll-behavior: smooth; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --coral: #FF5A5F; --coral-dark: #E04E53;
            --gradient: linear-gradient(135deg, #FF5A5F 0%, #FF8A6C 100%);
            --navy: #1a1a2e; --navy-light: #2d2d44;
            --bg: #F7F8FA; --white: #FFFFFF; --text: #1a1a2e;
            --text-light: #6b7280; --text-muted: #9ca3af;
            --border: #e5e7eb; --border-light: #f3f4f6;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 30px rgba(0,0,0,0.1);
            --shadow-xl: 0 20px 60px rgba(0,0,0,0.12);
            --radius: 12px; --radius-lg: 16px; --radius-xl: 20px;
        }
        body {
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg); color: var(--text);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* ─── HEADER ─── */
        .header { background: white; padding: 0 24px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border-light); box-shadow: 0 1px 6px rgba(0,0,0,0.05); }
        .header-inner {
            max-width: 1400px; margin: 0 auto;
            display: flex; align-items: center; justify-content: space-between; height: 80px;
        }
        .logo { display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--coral); }
        .nav { display: flex; gap: 4px; flex: 1; min-width: 0; margin-left: 24px; }
        .nav a { color: var(--text-light); text-decoration: none; font-size: 15px; font-weight: 700; padding: 10px 16px; border-radius: 24px; transition: all 0.2s; white-space: nowrap; }
        .nav a:hover { background: var(--bg); color: var(--text); }
        .nav a.active { color: var(--text); background: var(--bg); }
        .hamburger { background: none; border: 1px solid var(--border); cursor: pointer; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: all 0.2s; }
        .hamburger:hover { background: var(--bg); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .hamburger:active { transform: scale(0.92); }
        .hamburger svg { width: 18px; height: 18px; color: var(--text); }
        .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.3s; backdrop-filter: blur(4px); }
        .drawer-overlay.open { opacity: 1; pointer-events: auto; }
        .drawer { position: fixed; top: 0; right: -300px; width: 280px; height: 100vh; background: white; z-index: 201; box-shadow: -4px 0 20px rgba(0,0,0,0.15); transition: right 0.3s cubic-bezier(0.4,0,0.2,1); display: flex; flex-direction: column; }
        .drawer.open { right: 0; }
        .drawer-header { padding: 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border-light); }
        .drawer-header span { font-weight: 800; font-size: 18px; color: var(--text); }
        .drawer-close { background: none; border: none; cursor: pointer; width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        .drawer-close:hover { background: #f0f0f0; }
        .drawer-close svg { width: 20px; height: 20px; color: var(--text); }
        .drawer-nav { padding: 12px 16px; flex: 1; }
        .drawer-nav a { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: 10px; text-decoration: none; color: var(--text); font-size: 15px; font-weight: 700; transition: background 0.2s; }
        .drawer-nav a:hover { background: #f5f5f5; }
        .drawer-nav a.active { background: #FFF0F0; color: var(--coral); }
        .drawer-nav a svg { width: 20px; height: 20px; opacity: 0.7; }
        .drawer-divider { height: 1px; background: var(--border-light); margin: 8px 16px; }
        .drawer-user { padding: 16px 20px; border-top: 1px solid var(--border-light); }
        .drawer-user-info { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .drawer-user-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--gradient); display: flex; align-items: center; justify-content: center; }
        .drawer-user-avatar svg { width: 18px; height: 18px; color: white; }
        .drawer-user-name { font-weight: 700; font-size: 14px; }
        .drawer-user-email { font-size: 12px; color: var(--text-light); }
        .drawer-logout { width: 100%; padding: 10px; border-radius: 8px; border: 1.5px solid var(--border); background: white; font-size: 13px; font-weight: 700; color: var(--text); cursor: pointer; font-family: inherit; transition: all 0.2s; }
        .drawer-logout:hover { background: #f5f5f5; }
        .drawer-login { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--gradient); color: white; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }
        .drawer-login:hover { opacity: 0.9; }

        /* ─── BACK BUTTON ─── */
        .back-bar {
            max-width: 1200px; margin: 0 auto; padding: 16px 24px;
        }
        .back-btn {
            display: inline-flex; align-items: center; gap: 6px;
            color: var(--text-light); font-size: 14px; font-weight: 700;
            text-decoration: none; padding: 8px 14px; border-radius: 8px;
            transition: all 0.2s;
        }
        .back-btn:hover { background: white; color: var(--text); box-shadow: var(--shadow-sm); }
        .back-btn svg { width: 18px; height: 18px; }

        /* ─── HERO IMAGE ─── */
        .listing-page {
            max-width: 1200px; margin: 0 auto; padding: 0 24px 80px;
        }
        .hero-container {
            position: relative; border-radius: var(--radius-xl); overflow: hidden;
            background: #e8e8e8; margin-bottom: 0;
        }
        .listing-hero-img {
            width: 100%; height: 480px; object-fit: cover; display: block;
            animation: heroFadeIn 0.6s ease-out;
        }
        .hero-gradient {
            position: absolute; bottom: 0; left: 0; right: 0; height: 50%;
            background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 100%);
            pointer-events: none;
        }
        .hero-badge {
            position: absolute; top: 20px; left: 20px;
            display: inline-flex; align-items: center; gap: 6px;
            background: white; color: var(--navy);
            font-size: 13px; font-weight: 800; padding: 8px 16px;
            border-radius: 100px; box-shadow: var(--shadow-lg);
        }
        .hero-badge .badge-dot {
            width: 8px; height: 8px; border-radius: 50%; background: var(--coral);
        }
        .hero-share-btn {
            position: absolute; top: 20px; right: 20px;
            background: white; border: none; cursor: pointer;
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: var(--shadow-lg); transition: transform 0.2s;
        }
        .hero-share-btn:hover { transform: scale(1.1); }
        .hero-share-btn:active { transform: scale(0.95); }
        .hero-share-btn svg { width: 18px; height: 18px; color: var(--navy); }
        .hero-bottom-info {
            position: absolute; bottom: 20px; left: 24px; right: 24px;
            display: flex; justify-content: space-between; align-items: flex-end;
        }
        .hero-title-area h1 {
            color: white; font-size: 28px; font-weight: 900; margin-bottom: 4px;
            text-shadow: 0 2px 12px rgba(0,0,0,0.3);
        }
        .hero-title-area p {
            color: rgba(255,255,255,0.9); font-size: 15px; font-weight: 600;
        }
        .hero-price-tag {
            background: white; padding: 10px 20px; border-radius: 14px;
            box-shadow: var(--shadow-lg); text-align: right; flex-shrink: 0;
        }
        .hero-price-tag .price-amount {
            font-size: 24px; font-weight: 900; color: var(--navy);
        }
        .hero-price-tag .price-period {
            font-size: 13px; color: var(--text-light); font-weight: 600;
        }
        @keyframes heroFadeIn {
            from { opacity: 0; transform: scale(1.03); }
            to { opacity: 1; transform: scale(1); }
        }

        /* ─── KEY FACTS BAR ─── */
        .key-facts-bar {
            display: flex; gap: 10px; flex-wrap: wrap;
            padding: 20px 0 8px; margin-top: 4px;
        }
        .fact-pill {
            display: inline-flex; align-items: center; gap: 6px;
            background: white; border: 1px solid var(--border);
            padding: 8px 16px; border-radius: 100px;
            font-size: 13px; font-weight: 700; color: var(--navy);
            box-shadow: var(--shadow-sm);
        }
        .fact-pill .fact-icon { font-size: 15px; }
        .fact-pill.highlight {
            background: var(--coral); color: white; border-color: var(--coral);
        }

        /* ─── LISTING GRID ─── */
        .listing-grid {
            display: grid; grid-template-columns: 1fr 380px; gap: 36px;
            margin-top: 24px;
        }

        /* ─── LEFT COLUMN ─── */
        .listing-main { min-width: 0; }

        /* Section cards */
        .section-card {
            background: white; border-radius: var(--radius-lg); padding: 28px;
            border: 1px solid var(--border-light); box-shadow: var(--shadow-sm);
            margin-bottom: 20px;
            opacity: 0; transform: translateY(20px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .section-card.visible {
            opacity: 1; transform: translateY(0);
        }
        .section-card h3 {
            font-size: 18px; font-weight: 800; color: var(--navy);
            margin-bottom: 16px; display: flex; align-items: center; gap: 10px;
        }
        .section-card h3 .section-icon {
            width: 32px; height: 32px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; flex-shrink: 0;
        }
        .section-card h3 .icon-blue { background: #EFF6FF; }
        .section-card h3 .icon-green { background: #F0FDF4; }
        .section-card h3 .icon-purple { background: #FAF5FF; }
        .section-card h3 .icon-orange { background: #FFF7ED; }
        .section-card h3 .icon-coral { background: #FFF1F2; }

        /* Quick Facts grid */
        .features-summary {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 18px; background: var(--bg); border-radius: var(--radius);
            margin-bottom: 16px;
        }
        .features-score {
            display: flex; align-items: center; gap: 12px;
        }
        .features-score-ring {
            width: 52px; height: 52px; border-radius: 50%; position: relative;
            display: flex; align-items: center; justify-content: center;
        }
        .features-score-ring svg { width: 52px; height: 52px; transform: rotate(-90deg); }
        .features-score-ring circle {
            fill: none; stroke-width: 4; cx: 26; cy: 26; r: 22;
        }
        .features-score-ring .ring-bg { stroke: #e5e7eb; }
        .features-score-ring .ring-fill { stroke: var(--coral); stroke-linecap: round; transition: stroke-dashoffset 1s ease; }
        .features-score-number {
            position: absolute; inset: 0; display: flex; align-items: center;
            justify-content: center; font-size: 14px; font-weight: 800; color: var(--navy);
        }
        .features-score-text { font-size: 14px; font-weight: 700; color: var(--navy); line-height: 1.3; }
        .features-score-text span { font-size: 12px; font-weight: 600; color: var(--text-muted); display: block; }
        .features-best {
            text-align: right; font-size: 12px; color: var(--text-muted); font-weight: 600;
            padding: 6px 12px; background: white; border-radius: 8px; line-height: 1.4;
        }
        .features-best strong { color: var(--coral); font-weight: 800; }

        .quick-facts-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px;
        }
        .quick-fact-item {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 14px; background: var(--bg); border-radius: var(--radius);
            transition: all 0.2s;
        }
        .quick-fact-item.available {
            background: #F0FDF4; border: 1.5px solid #bbf7d0;
        }
        .quick-fact-item.unavailable {
            background: #f9fafb; border: 1.5px solid transparent; opacity: 0.5;
        }
        .quick-fact-icon {
            width: 36px; height: 36px; border-radius: 10px; background: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; flex-shrink: 0; box-shadow: var(--shadow-sm);
        }
        .quick-fact-item.unavailable .quick-fact-icon { opacity: 0.4; filter: grayscale(1); }
        .quick-fact-label { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .quick-fact-value { font-size: 13px; font-weight: 800; color: var(--navy); display: flex; align-items: center; gap: 5px; }
        .quick-fact-item.unavailable .quick-fact-value { color: #9ca3af; }
        .check-icon { width: 14px; height: 14px; flex-shrink: 0; }
        .check-icon.yes { color: #22c55e; }
        .check-icon.no { color: #d1d5db; }

        /* Cost estimate */
        .cost-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
        }
        .cost-item {
            padding: 16px; background: var(--bg); border-radius: var(--radius);
            text-align: center;
        }
        .cost-item.primary {
            background: linear-gradient(135deg, #FF5A5F08 0%, #FF8A6C12 100%);
            border: 1.5px solid #FF5A5F20;
            grid-column: 1 / -1;
        }
        .cost-amount { font-size: 28px; font-weight: 900; color: var(--navy); }
        .cost-item.primary .cost-amount { font-size: 36px; color: var(--coral); }
        .cost-label { font-size: 12px; color: var(--text-light); font-weight: 600; margin-top: 2px; }

        /* About text */
        .about-text { font-size: 15px; color: var(--text-light); line-height: 1.75; }

        /* Map section */
        .listing-map {
            width: 100%; height: 280px; border-radius: var(--radius);
            border: 1px solid var(--border-light); margin-top: 16px;
        }
        .map-context {
            display: flex; gap: 16px; margin-top: 12px;
        }
        .map-context-item {
            display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; color: var(--text-light);
        }
        .map-dot {
            width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
        }
        .map-dot.coral { background: var(--coral); }
        .map-dot.blue { background: #1a73e8; }

        /* ─── SIMILAR LISTINGS ─── */
        .similar-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
        }
        .similar-card {
            background: white; border-radius: var(--radius); overflow: hidden;
            border: 1px solid var(--border-light); box-shadow: var(--shadow-sm);
            text-decoration: none; color: var(--text);
            transition: transform 0.2s, box-shadow 0.2s; cursor: pointer;
        }
        .similar-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
        .similar-card img {
            width: 100%; height: 130px; object-fit: cover; display: block;
        }
        .similar-card-body { padding: 14px; }
        .similar-card-title { font-size: 14px; font-weight: 800; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .similar-card-price { font-size: 16px; font-weight: 900; color: var(--coral); }
        .similar-card-price span { font-size: 12px; font-weight: 600; color: var(--text-light); }
        .similar-card-meta { font-size: 12px; color: var(--text-light); font-weight: 600; margin-top: 4px; }

        /* ─── RIGHT COLUMN: CONTACT CARD ─── */
        .contact-card {
            background: var(--white); border-radius: var(--radius-xl);
            padding: 0; box-shadow: var(--shadow-xl);
            position: sticky; top: 100px; border: 1px solid var(--border-light);
            overflow: hidden;
            animation: slideInRight 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(24px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .contact-card-header {
            background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
            padding: 24px 28px;
        }
        .contact-price-row { display: flex; align-items: baseline; gap: 6px; }
        .contact-price { font-size: 36px; font-weight: 900; color: white; line-height: 1.1; }
        .contact-price-period { font-size: 16px; font-weight: 600; color: rgba(255,255,255,0.6); }
        .contact-rating-row {
            display: flex; align-items: center; gap: 8px; margin-top: 10px;
        }
        .contact-rating-stars {
            display: flex; align-items: center; gap: 2px;
        }
        .contact-rating-stars svg { width: 14px; height: 14px; color: #FBBF24; }
        .contact-rating-text { font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.9); }
        .contact-verified-badge {
            display: inline-flex; align-items: center; gap: 5px;
            background: rgba(255,255,255,0.15); padding: 4px 12px; border-radius: 100px;
            font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.9);
        }
        .contact-verified-badge svg { width: 14px; height: 14px; }

        .contact-card-body { padding: 24px 28px; }

        .contact-trust-text {
            display: flex; align-items: center; gap: 8px;
            font-size: 13px; color: var(--text-light); font-weight: 600;
            margin-bottom: 20px; padding: 10px 14px;
            background: #F0FDF4; border-radius: 10px;
        }
        .contact-trust-text svg { width: 16px; height: 16px; color: #22C55E; flex-shrink: 0; }

        .contact-details-grid { margin-bottom: 20px; }
        .contact-detail-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; font-size: 14px;
            border-bottom: 1px solid var(--border-light);
        }
        .contact-detail-row:last-child { border-bottom: none; }
        .contact-detail-label { color: var(--text-light); font-weight: 600; }
        .contact-detail-value { font-weight: 700; color: var(--navy); }

        /* Inquiry form */
        .inquiry-section { margin-top: 4px; }
        .inquiry-section h4 {
            font-size: 15px; font-weight: 800; color: var(--navy);
            margin-bottom: 14px;
        }
        .form-field { position: relative; margin-bottom: 12px; }
        .form-field input, .form-field textarea {
            width: 100%; padding: 14px 16px; padding-top: 20px;
            border: 1.5px solid var(--border); border-radius: var(--radius);
            font-size: 14px; font-family: inherit; background: var(--bg);
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none; color: var(--text);
        }
        .form-field input:focus, .form-field textarea:focus {
            border-color: var(--coral); box-shadow: 0 0 0 3px rgba(255,90,95,0.1);
            background: white;
        }
        .form-field label {
            position: absolute; top: 6px; left: 16px;
            font-size: 10px; font-weight: 700; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.5px;
            pointer-events: none;
        }
        .form-field textarea { resize: vertical; min-height: 60px; }

        .btn-inquiry {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; padding: 14px; border-radius: var(--radius);
            background: var(--gradient); color: white; border: none;
            font-size: 16px; font-weight: 800; cursor: pointer;
            font-family: inherit; transition: all 0.2s;
            box-shadow: 0 4px 14px rgba(255,90,95,0.3);
        }
        .btn-inquiry:hover { box-shadow: 0 6px 20px rgba(255,90,95,0.4); transform: translateY(-1px); }
        .btn-inquiry:active { transform: scale(0.98) translateY(0); }
        .btn-inquiry svg { width: 18px; height: 18px; }

        .btn-directions {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; padding: 13px; border-radius: var(--radius);
            background: white; color: var(--navy); border: 1.5px solid var(--border);
            font-size: 14px; font-weight: 700; cursor: pointer;
            font-family: inherit; transition: all 0.2s;
            text-decoration: none; margin-top: 10px;
        }
        .btn-directions:hover { border-color: var(--navy); background: var(--bg); }
        .btn-directions:active { transform: scale(0.98); }
        .btn-directions svg { width: 16px; height: 16px; }

        .btn-share {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; padding: 13px; border-radius: var(--radius);
            background: white; color: var(--text-light); border: 1.5px solid var(--border);
            font-size: 14px; font-weight: 700; cursor: pointer;
            font-family: inherit; transition: all 0.2s;
            margin-top: 8px;
        }
        .btn-share:hover { border-color: var(--text-light); color: var(--navy); }
        .btn-share svg { width: 16px; height: 16px; }

        .inquiry-success {
            display: none; text-align: center; padding: 20px;
            color: #065f46; background: #d1fae5; border-radius: var(--radius);
            font-weight: 700; font-size: 14px;
        }
        .inquiry-success svg { width: 32px; height: 32px; color: #22C55E; margin-bottom: 8px; }

        /* ─── TOAST ─── */
        .toast {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: var(--navy); color: white; padding: 12px 24px;
            border-radius: 100px; font-size: 14px; font-weight: 700;
            box-shadow: var(--shadow-xl); opacity: 0; pointer-events: none;
            transition: opacity 0.3s, transform 0.3s; z-index: 1000;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ─── LOADING SKELETON ─── */
        .loading-page {
            text-align: center; padding: 80px 24px;
            color: var(--text-light); font-size: 16px;
        }
        .skeleton {
            animation: skeletonPulse 1.8s ease-in-out infinite;
        }
        .skeleton-hero {
            width: 100%; height: 480px; border-radius: var(--radius-xl);
            background: linear-gradient(110deg, #e8e8e8 8%, #f5f5f5 18%, #e8e8e8 33%);
            background-size: 200% 100%;
            animation: skeletonShimmer 1.5s linear infinite;
        }
        .skeleton-bar {
            height: 20px; border-radius: 6px; background: #e8e8e8; margin-bottom: 10px;
        }
        .skeleton-card {
            background: white; border-radius: var(--radius-lg); padding: 28px;
            border: 1px solid var(--border-light); margin-bottom: 20px;
        }
        @keyframes skeletonShimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ─── MOBILE STICKY CTA ─── */
        .mobile-cta {
            display: none; position: fixed; bottom: 0; left: 0; right: 0;
            background: white; border-top: 1px solid var(--border);
            padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
            z-index: 800; box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
        }
        .mobile-cta-inner {
            display: flex; align-items: center; justify-content: space-between; gap: 12px;
        }
        .mobile-cta-price {
            font-size: 20px; font-weight: 900; color: var(--navy);
        }
        .mobile-cta-price span { font-size: 13px; font-weight: 600; color: var(--text-light); }
        .mobile-cta-btn {
            background: var(--gradient); color: white; border: none;
            padding: 12px 24px; border-radius: 100px; font-size: 15px;
            font-weight: 800; cursor: pointer; font-family: inherit;
            box-shadow: 0 4px 14px rgba(255,90,95,0.3); flex-shrink: 0;
            transition: all 0.2s;
        }
        .mobile-cta-btn:active { transform: scale(0.96); }

        /* ─── COLLAPSIBLE SECTIONS (MOBILE) ─── */
        .section-toggle {
            display: none; cursor: pointer; user-select: none;
        }
        .section-toggle svg {
            width: 20px; height: 20px; color: var(--text-light);
            transition: transform 0.3s;
        }
        .section-toggle.collapsed svg { transform: rotate(-90deg); }
        .section-body { transition: max-height 0.3s ease, opacity 0.3s ease; overflow: hidden; }
        .section-body.collapsed { max-height: 0 !important; opacity: 0; }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 900px) {
            .listing-grid { grid-template-columns: 1fr; gap: 24px; }
            .listing-hero-img { height: 320px; }
            .contact-card { position: static; }
            .nav { gap: 2px; }
            .hero-bottom-info { flex-direction: column; align-items: flex-start; gap: 10px; }
            .hero-price-tag { align-self: flex-start; }
            .similar-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 600px) {
            .header { padding: 0 10px; }
            .header-inner { height: 52px; gap: 8px; }
            .logo svg { width: 20px; height: 20px; }
            .logo-text { font-size: 15px; }
            .nav { gap: 0; }
            .nav a { font-size: 11px; padding: 5px 6px; border-radius: 6px; white-space: nowrap; }
            .header-logout { padding: 4px 8px; font-size: 10px; white-space: nowrap; }
            .header-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; margin-left: auto; }
            .header-user-avatar { width: 26px; height: 26px; }
            .header-auth-btn { padding: 5px 10px; font-size: 11px; white-space: nowrap; }

            .back-bar { padding: 10px 12px; }
            .back-btn { font-size: 13px; padding: 6px 10px; }
            .back-btn svg { width: 16px; height: 16px; }

            .listing-page { padding: 0 12px 120px; }
            .listing-hero-img { height: 240px; }
            .hero-container { border-radius: var(--radius); }
            .listing-grid { gap: 16px; margin-top: 16px; }
            .key-facts-bar { gap: 8px; padding: 14px 0 4px; }
            .fact-pill { padding: 6px 12px; font-size: 12px; }

            .section-card { padding: 20px; border-radius: var(--radius); margin-bottom: 14px; }
            .section-card h3 { font-size: 16px; margin-bottom: 12px; }
            .quick-facts-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
            .quick-fact-item { padding: 10px 12px; }
            .quick-fact-icon { width: 30px; height: 30px; font-size: 15px; }
            .features-summary { flex-direction: column; gap: 10px; align-items: flex-start; }
            .features-best { text-align: left; }
            .cost-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
            .cost-amount { font-size: 22px; }
            .cost-item.primary .cost-amount { font-size: 28px; }

            .listing-map { height: 200px; border-radius: 10px; }

            .contact-card { border-radius: var(--radius); }
            .contact-card-header { padding: 20px; }
            .contact-price { font-size: 28px; }
            .contact-card-body { padding: 20px; }
            .form-field input, .form-field textarea { padding: 12px 14px; padding-top: 18px; font-size: 13px; }

            .similar-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
            .similar-card img { height: 100px; }

            .hero-bottom-info { bottom: 16px; left: 16px; right: 16px; }
            .hero-title-area h1 { font-size: 20px; }
            .hero-price-tag { padding: 8px 14px; }
            .hero-price-tag .price-amount { font-size: 18px; }

            .mobile-cta { display: block; }
            .section-toggle { display: flex; }

            /* hide desktop contact card on mobile since we have sticky CTA */
            .contact-card { display: block; }
        }

        /* ─── BOTTOM NAV BAR (MOBILE) ─── */
        .bottom-nav {
            display: none; position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(255,255,255,0.92); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid var(--border-light);
            padding: 6px 0 calc(6px + env(safe-area-inset-bottom));
            z-index: 900; justify-content: space-around; align-items: center;
        }
        .bottom-nav-item {
            display: flex; flex-direction: column; align-items: center;
            text-decoration: none; color: var(--text-light); font-size: 10px;

        }
        .bottom-nav-item svg { width: 22px; height: 22px; }
        .bottom-nav-item.active { color: var(--coral); }
        .bottom-nav-item.post-tab {
            background: var(--gradient); color: white; border-radius: 50%;
            width: 48px; height: 48px; padding: 0; margin-top: -16px;
            box-shadow: 0 4px 12px rgba(255,90,95,0.35);
        }
        .bottom-nav-item.post-tab svg { width: 24px; height: 24px; }

        /* ─── SITE FOOTER (DESKTOP) ─── */
        .site-footer {
            background: white; border-top: 1px solid var(--border-light);
            padding: 32px 24px;
        }
        .site-footer-inner {
            max-width: 1400px; margin: 0 auto;
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 12px;
        }

            font-size: 14px; font-weight: 600; transition: color 0.2s;
        }
        .site-footer-links a:hover { color: var(--text); text-decoration: underline; }

        @media (max-width: 600px) {
            .bottom-nav { display: flex; }
            .nav { display: none; }
            .site-footer { display: none; } .header-right { display: none; }
            body { padding-bottom: calc(64px + env(safe-area-inset-bottom)); }
        }

            <a href="explore.html"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l5.447 2.724A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/></svg>Explore Map</a>

    <script>
    const SUPA_URL = 'https://pekqhcxbhtgfsqtiunic.supabase.co';
    const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBla3FoY3hiaHRnZnNxdGl1bmljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTkxMjMsImV4cCI6MjA5MDQzNTEyM30.YlEBAX2Oh5CKsSeVCS-UZq93np58xUUP0RlddISLgFY';
    let sb, currentUser = null;
    try { sb = window.supabase.createClient(SUPA_URL, SUPA_KEY); } catch(e) {}

    const ABAC_LAT = 13.6116, ABAC_LNG = 100.8370;

    async function boot() {
        const { data: { session } } = await sb.auth.getSession();
        currentUser = session?.user || null;
        updateHeaderUI();
        sb.auth.onAuthStateChange((_, session) => {
            currentUser = session?.user || null;
            updateHeaderUI();
        });
        loadListing();
    }

    function toggleDrawer() {
        document.getElementById('drawer').classList.toggle('open');
        document.getElementById('drawerOverlay').classList.toggle('open');
    }
    function updateHeaderUI() {
        const el = document.getElementById('drawerUser');
        const hr = document.getElementById('headerRight');
        if (currentUser) {
            const name = currentUser.email.split('@')[0];
            el.innerHTML = `<div class="drawer-user-info"><div class="drawer-user-avatar"><svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm0 2c-3.87 0-7 2.24-7 5v1h14v-1c0-2.76-3.13-5-7-5z"/></svg></div><div><div class="drawer-user-name">${name}</div><div class="drawer-user-email">${currentUser.email}</div></div></div><button class="drawer-logout" onclick="handleLogout()">Log out</button>`;
            if (hr) hr.innerHTML = `<div class="header-user"><div class="header-user-avatar"><svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm0 2c-3.87 0-7 2.24-7 5v1h14v-1c0-2.76-3.13-5-7-5z"/></svg></div></div><button class="header-logout" onclick="handleLogout()">Log out</button>`;
        } else {
            el.innerHTML = `<button class="drawer-login" onclick="window.location.href='index.html'">Log in / Sign up</button>`;
            if (hr) hr.innerHTML = `<button class="header-auth-btn" onclick="window.location.href='index.html'">Log in / Sign up</button>`;
        }
    }

    async function handleLogout() { await sb.auth.signOut(); window.location.href = 'index.html'; }

    // Features students actually care about — matched to real database data
    const ALL_FEATURES = [
        { key: 'furnished', icon: '🪑', label: 'Furnished',   pattern: /(fully\s+)?furnished/i,               valueFn: m => m[1] ? 'Fully Furnished' : 'Yes' },
        { key: 'wifi',      icon: '📶', label: 'WiFi',        pattern: /wifi|wi-fi|internet/i,                valueFn: () => 'Included' },
        { key: 'pool',      icon: '🏊', label: 'Pool',        pattern: /pool/i,                               valueFn: () => 'Available' },
        { key: 'gym',       icon: '🏋️', label: 'Gym',        pattern: /gym|fitness/i,                        valueFn: () => 'Available' },
        { key: 'parking',   icon: '🚗', label: 'Parking',     pattern: /parking/i,                            valueFn: () => 'Available' },
        { key: 'security',  icon: '🔒', label: 'Security',    pattern: /security|cctv|keycard|key.?card|guard/i, valueFn: () => 'Available' },
        { key: 'pet',       icon: '🐾', label: 'Pet Friendly', pattern: /pet.?friendly|pet.?ok|pets?\s+allow/i, valueFn: () => 'Allowed' },
        { key: 'shuttle',   icon: '🚐', label: 'ABAC Shuttle', pattern: /shuttle/i,                           valueFn: () => 'Available' },
        { key: 'laundry',   icon: '👕', label: 'Laundry',     pattern: /laundry|washing|washer/i,             valueFn: () => 'Available' },
    ];

    // Parse details and return all features with available/unavailable status
    function parseAllFeatures(details) {
        const str = (details || '').toLowerCase();
        return ALL_FEATURES.map(f => {
            const match = str.match(f.pattern);
            return {
                key: f.key,
                icon: f.icon,
                label: f.label,
                available: !!match,
                value: match ? f.valueFn(match) : 'Not listed',
            };
        });
    }

    // Count features for a single listing's details string
    function countFeatures(details) {
        const str = (details || '').toLowerCase();
        return ALL_FEATURES.filter(f => f.pattern.test(str)).length;
    }

    // Fetch the best feature count across all listings
    async function getBestFeatureCount() {
        try {
            const { data } = await sb.from('listings').select('details');
            if (!data || data.length === 0) return 0;
            return Math.max(...data.map(l => countFeatures(l.details)));
        } catch(e) { return 0; }
    }

    function generateStars(rating) {
        const full = Math.floor(rating);
        const half = rating % 1 >= 0.5 ? 1 : 0;
        let html = '';
        for (let i = 0; i < full; i++) html += '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>';
        if (half) html += '<svg viewBox="0 0 24 24" fill="currentColor" opacity="0.5"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>';
        return html;
    }

    async function loadListing() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        if (!id) { document.getElementById('listingContent').innerHTML = '<div class="loading-page">Listing not found</div>'; return; }

        const { data: l, error } = await sb.from('listings').select('*').eq('id', id).single();
        if (error || !l) { document.getElementById('listingContent').innerHTML = '<div class="loading-page">Listing not found</div>'; return; }

        document.title = `${l.title} | AbacCondo`;

        const cat = { walking: 'Walking Distance', ride: 'Short Ride', budget: 'Budget Friendly' };
        const catIcon = { walking: '\u{1F6B6}', ride: '\u{1F6F5}', budget: '\u{1F4B0}' };
        const phone = l.phone || null;
        const condoPos = { lat: Number(l.lat), lng: Number(l.lng) };
        const rating = Number(l.rating).toFixed(1);
        const price = Number(l.price).toLocaleString();
        const allFeatures = parseAllFeatures(l.details);
        const availableCount = allFeatures.filter(f => f.available).length;
        const totalCount = allFeatures.length;
        const bestCount = await getBestFeatureCount();
        const scorePercent = Math.round((availableCount / totalCount) * 100);
        const circumference = 2 * Math.PI * 22;
        const dashOffset = circumference - (scorePercent / 100) * circumference;

        const checkYes = '<svg class="check-icon yes" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"/></svg>';
        const checkNo = '<svg class="check-icon no" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"/></svg>';

        // Build features HTML — available first, then unavailable
        const sortedFeatures = [...allFeatures].sort((a, b) => b.available - a.available);
        const factsHTML = sortedFeatures.map(f =>
            `<div class="quick-fact-item ${f.available ? 'available' : 'unavailable'}">
                <div class="quick-fact-icon">${f.icon}</div>
                <div>
                    <div class="quick-fact-label">${f.label}</div>
                    <div class="quick-fact-value">${f.available ? checkYes : checkNo} ${f.value}</div>
                </div>
            </div>`
        ).join('');

        const featuresSummaryHTML = `
            <div class="features-summary">
                <div class="features-score">
                    <div class="features-score-ring">
                        <svg viewBox="0 0 52 52">
                            <circle class="ring-bg" />
                            <circle class="ring-fill" stroke-dasharray="${circumference}" stroke-dashoffset="${dashOffset}" />
                        </svg>
                        <div class="features-score-number">${availableCount}/${totalCount}</div>
                    </div>
                    <div class="features-score-text">
                        ${availableCount} feature${availableCount !== 1 ? 's' : ''} available
                        <span>out of ${totalCount} total features we track</span>
                    </div>
                </div>
                <div class="features-best">
                    Best condo has <strong>${bestCount}/${totalCount}</strong>
                    ${availableCount >= bestCount ? '<br>🏆 This is a top condo!' : ''}
                </div>
            </div>`;

        document.getElementById('listingContent').innerHTML = `
            <!-- HERO -->
            <div class="hero-container">
                <img class="listing-hero-img" src="${l.image_url || ''}" alt="${l.title}"
                    onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 1200 480%22><rect fill=%22%23e8e8e8%22 width=%221200%22 height=%22480%22/><text x=%22600%22 y=%22245%22 text-anchor=%22middle%22 fill=%22%23bbb%22 font-size=%2220%22>No photo available</text></svg>'">
                <div class="hero-gradient"></div>
                ${l.badge ? `<div class="hero-badge"><span class="badge-dot"></span>${l.badge}</div>` : ''}
                <button class="hero-share-btn" onclick="shareListing()" title="Share this listing">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
                </button>
                <div class="hero-bottom-info">
                    <div class="hero-title-area">
                        <h1>${l.title}</h1>
                        <p>${l.distance}</p>
                    </div>
                    <div class="hero-price-tag">
                        <div class="price-amount">\u{0E3F}${price}</div>
                        <div class="price-period">per month</div>
                    </div>
                </div>
            </div>

            <!-- KEY FACTS BAR -->
            <div class="key-facts-bar">
                <div class="fact-pill highlight">
                    <span class="fact-icon">\u{0E3F}</span> ${price}/mo
                </div>
                <div class="fact-pill">
                    <span class="fact-icon">\u{1F4CD}</span> ${l.distance}
                </div>

                                campus facilities, local amenities, and public transport.

                        </div>

                            <span class="section-icon icon-orange">\u{1F4CD}</span>
                            Location & Commute

                        <div class="section-body">
                            <p class="about-text" style="margin-bottom:12px;">
                                This property is ${l.distance.toLowerCase()} from ABAC Bangna campus.

                                ${l.badge ? `<span class="contact-verified-badge"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>${l.badge}</span>` : ''}
                            </div>

                        <div class="contact-card-body">
                            <div class="contact-trust-text">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>

                            <div class="contact-details-grid">

                                Get Directions from ABAC
                            </a>

                            <button class="btn-share" onclick="shareListing()">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>

        // Set up mobile CTA
        const mobileCta = document.getElementById('mobileCta');
        const mobileCTAPrice = document.getElementById('mobileCTAPrice');
        if (mobileCTAPrice) {
            mobileCTAPrice.innerHTML = `\u{0E3F}${price}<span>/mo</span>`;
        }
        if (window.innerWidth <= 600 && mobileCta) {
            mobileCta.style.display = 'block';
        }

        // Init map
        initListingMap(condoPos, l.title);

        // Trigger scroll animations
        initScrollAnimations();

        // Load similar listings
        loadSimilarListings(l.category, l.id);

        // Re-bind haptics
        bindHaptics();
    }

    function scrollToInquiry() {
        const el = document.getElementById('inquirySection');
        if (el) {
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            // Brief highlight effect
            const card = document.getElementById('contactCard');
            if (card) {
                card.style.transition = 'box-shadow 0.3s';
                card.style.boxShadow = '0 0 0 3px rgba(255,90,95,0.3), 0 8px 30px rgba(0,0,0,0.1)';
                setTimeout(() => { card.style.boxShadow = ''; }, 2000);
            }
        }
        haptic('light');
    }

    // Section toggle for mobile collapsible
    function toggleSection(btn) {
        const body = btn.closest('.section-card').querySelector('.section-body');
        btn.classList.toggle('collapsed');
        if (body.classList.contains('collapsed')) {
            body.classList.remove('collapsed');
            body.style.maxHeight = body.scrollHeight + 'px';
            setTimeout(() => body.style.maxHeight = 'none', 300);
        } else {
            body.style.maxHeight = body.scrollHeight + 'px';
            requestAnimationFrame(() => {
                body.style.maxHeight = '0';
                body.classList.add('collapsed');
            });
        }
        haptic('light');
    }

    // Scroll-triggered fade-in
    function initScrollAnimations() {
        const cards = document.querySelectorAll('[data-animate]');
        if (!cards.length) return;

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

        cards.forEach((card, i) => {
            card.style.transitionDelay = (i * 80) + 'ms';
            observer.observe(card);
        });
    }

    // Share listing
    function shareListing() {
        const url = window.location.href;
        if (navigator.share) {
            navigator.share({ title: document.title, url: url }).catch(() => {});
        } else {
            navigator.clipboard.writeText(url).then(() => {
                showToast('Link copied to clipboard!');
            }).catch(() => {
                showToast('Could not copy link');
            });
        }
        haptic('success');
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // Load similar listings
    async function loadSimilarListings(category, currentId) {
        try {
            const { data: listings } = await sb.from('listings')
                .select('id, title, price, distance, image_url, rating')
                .eq('category', category)
                .neq('id', currentId)
                .limit(3);

            if (!listings || listings.length === 0) return;

            const section = document.getElementById('similarSection');
            const grid = document.getElementById('similarGrid');
            if (!section || !grid) return;

            grid.innerHTML = listings.map(item => `
                <a href="listing.html?id=${item.id}" class="similar-card">
                    <img src="${item.image_url || ''}" alt="${item.title}"
                        onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 400 130%22><rect fill=%22%23e8e8e8%22 width=%22400%22 height=%22130%22/><text x=%22200%22 y=%2270%22 text-anchor=%22middle%22 fill=%22%23bbb%22 font-size=%2214%22>No photo</text></svg>'">
                    <div class="similar-card-body">
                        <div class="similar-card-title">${item.title}</div>
                        <div class="similar-card-price">\u{0E3F}${Number(item.price).toLocaleString()} <span>/mo</span></div>
                        <div class="similar-card-meta">${item.distance}</div>
                    </div>
                </a>
            `).join('');

            section.style.display = 'block';
        } catch(e) {
            // Silently fail - similar listings are not critical
        }
    }

    function initListingMap(condoPos, title) {
        const mapEl = document.getElementById('listingMap');
        if (!mapEl || typeof google === 'undefined') return;

        const ABAC = { lat: ABAC_LAT, lng: ABAC_LNG };
        const bounds = new google.maps.LatLngBounds();
        bounds.extend(ABAC);
        bounds.extend(condoPos);

        const map = new google.maps.Map(mapEl, {
            center: condoPos,
            zoom: 15,
            mapTypeControl: false,
            streetViewControl: false,
            fullscreenControl: true,
            zoomControl: true,
            styles: [
                { featureType: 'poi.business', stylers: [{ visibility: 'off' }] },
                { featureType: 'poi.park', elementType: 'labels', stylers: [{ visibility: 'off' }] }
            ]
        });

        map.fitBounds(bounds, 50);

        // Condo marker
        new google.maps.Marker({
            position: condoPos,
            map: map,
            icon: {
                path: google.maps.SymbolPath.CIRCLE,
                fillColor: '#FF5A5F',
                fillOpacity: 1,
                strokeColor: 'white',
                strokeWeight: 2.5,
                scale: 10
            },
            title: title
        });

        // ABAC marker
        new google.maps.Marker({
            position: ABAC,
            map: map,
            icon: {
                url: 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40"><circle cx="20" cy="20" r="18" fill="#1a73e8" stroke="white" stroke-width="3"/><text x="20" y="24" text-anchor="middle" fill="white" font-size="16" font-weight="bold" font-family="sans-serif">\u{1F393}</text></svg>'),
                scaledSize: new google.maps.Size(40, 40),
                anchor: new google.maps.Point(20, 20)
            },
            title: 'ABAC Campus'
        });

        // Try to show actual road route, fallback to straight line
        try {
            const directionsService = new google.maps.DirectionsService();
            const directionsRenderer = new google.maps.DirectionsRenderer({
                map: map,
                suppressMarkers: true,
                polylineOptions: {
                    strokeColor: '#FF5A5F',
                    strokeOpacity: 0.7,
                    strokeWeight: 4
                }
            });

            directionsService.route({
                origin: ABAC,
                destination: condoPos,
                travelMode: google.maps.TravelMode.DRIVING
            }, (result, status) => {
                if (status === 'OK') {
                    directionsRenderer.setDirections(result);
                } else {
                    drawFallbackLine(map, ABAC, condoPos);
                }
            });
        } catch (e) {
            drawFallbackLine(map, ABAC, condoPos);
        }
    }

    function drawFallbackLine(map, from, to) {
        new google.maps.Polyline({
            path: [from, to],
            geodesic: true,
            strokeColor: '#FF5A5F',
            strokeOpacity: 0.6,
            strokeWeight: 3,
            icons: [{
                icon: { path: 'M 0,-1 0,1', strokeOpacity: 0.6, scale: 3 },
                offset: '0', repeat: '16px'
            }],
            map: map
        });
    }

    // ── HAPTIC FEEDBACK ──
    function haptic(type) {
        if (!navigator.vibrate) return;
        const patterns = { light: 10, medium: 25, success: [10, 50, 20], error: [30, 50, 30] };
        try { navigator.vibrate(patterns[type] || 10); } catch(e) {}
    }

    function bindHaptics() {
        document.querySelectorAll('.btn-inquiry, .btn-directions, .btn-share, .back-btn, .hero-share-btn').forEach(btn => {
            btn.addEventListener('click', () => haptic('light'));
        });
    }

    // ── INQUIRY SUBMISSION ──
    async function submitInquiry(e, listingId) {
        e.preventDefault();
        const btn = document.getElementById('inqBtn');
        btn.disabled = true;
        btn.innerHTML = '<span style="display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin .6s linear infinite;"></span> Sending...';

        // Add spinner keyframes dynamically
        if (!document.getElementById('spinStyle')) {
            const style = document.createElement('style');
            style.id = 'spinStyle';
            style.textContent = '@keyframes spin{to{transform:rotate(360deg)}}';
            document.head.appendChild(style);
        }

        try {
            const inquiry = {
                listing_id: listingId,
                name: document.getElementById('inqName').value,
                email: document.getElementById('inqEmail').value,
                phone: document.getElementById('inqPhone').value || null,
                message: document.getElementById('inqMessage').value || null,
                status: 'new',
            };
            const { error } = await sb.from('inquiries').insert([inquiry]);
            if (error) throw error;
            // Show success, hide form
            document.getElementById('inquiryForm').style.display = 'none';
            document.getElementById('inqSuccess').style.display = 'block';
            haptic('success');
            showToast('Inquiry sent successfully!');
        } catch (err) {
            alert('Error sending inquiry: ' + err.message);
            haptic('error');
        }
        btn.disabled = false;
        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg> Send Inquiry';
    }

    // Show mobile CTA on resize
    window.addEventListener('resize', () => {
        const cta = document.getElementById('mobileCta');
        if (cta && cta.querySelector('.mobile-cta-price').textContent) {
            cta.style.display = window.innerWidth <= 600 ? 'block' : 'none';
        }
    });

    boot();
    </script>
