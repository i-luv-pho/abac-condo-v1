<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Listing | AbacCondo</title>
    <link rel="icon" type="image/png" sizes="64x64" href="favicon-64.png?v=3">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png?v=3">
    <link rel="apple-touch-icon" href="favicon.png">
    <meta name="theme-color" content="#FF5A5F">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="preconnect" href="https://pekqhcxbhtgfsqtiunic.supabase.co">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBfbugmOoOnX9f_wL8RzgttgqP76J6g-gY" async defer></script>
    <style>
        html { scroll-behavior: smooth; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --coral: #FF5A5F; --coral-dark: #E04E53;
            --gradient: linear-gradient(135deg, #FF5A5F 0%, #FF8A6C 100%);
            --bg: #F7F7F7; --white: #FFFFFF; --text: #222222;
            --text-light: #717171; --border: #DDDDDD;
            --border-light: #EBEBEB;
            --shadow: 0 2px 8px rgba(0,0,0,0.1);
            --shadow-lg: 0 6px 20px rgba(0,0,0,0.15);
        }
        body {
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg); color: var(--text);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            
        }

        /* ─── HEADER ─── */
        .header { background: white; padding: 0 24px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border-light); box-shadow: 0 1px 6px rgba(0,0,0,0.05); }
        .header-inner {
            max-width: 1400px; margin: 0 auto;
            display: flex; align-items: center; justify-content: space-between; height: 80px;
        }
        .logo { display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--coral); }
        .nav { display: flex; gap: 4px; flex: 1; min-width: 0; margin-left: 24px; }
        .nav a { color: var(--text-light); text-decoration: none; font-size: 15px; font-weight: 700; padding: 10px 16px; border-radius: 24px; transition: all 0.2s; white-space: nowrap; }
        .nav a:hover { background: var(--bg); color: var(--text); }
        .nav a.active { color: var(--text); background: var(--bg); }
        .hamburger { background: none; border: 1px solid var(--border); cursor: pointer; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: all 0.2s; }
        .hamburger:hover { background: var(--bg); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .hamburger:active { transform: scale(0.92); }
        .hamburger svg { width: 18px; height: 18px; color: var(--text); }
        .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.3s; backdrop-filter: blur(4px); }
        .drawer-overlay.open { opacity: 1; pointer-events: auto; }
        .drawer { position: fixed; top: 0; right: -300px; width: 280px; height: 100vh; background: white; z-index: 201; box-shadow: -4px 0 20px rgba(0,0,0,0.15); transition: right 0.3s cubic-bezier(0.4,0,0.2,1); display: flex; flex-direction: column; }
        .drawer.open { right: 0; }
        .drawer-header { padding: 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border-light); }
        .drawer-header span { font-weight: 800; font-size: 18px; color: var(--text); }
        .drawer-close { background: none; border: none; cursor: pointer; width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        .drawer-close:hover { background: #f0f0f0; }
        .drawer-close svg { width: 20px; height: 20px; color: var(--text); }
        .drawer-nav { padding: 12px 16px; flex: 1; }
        .drawer-nav a { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: 10px; text-decoration: none; color: var(--text); font-size: 15px; font-weight: 700; transition: background 0.2s; }
        .drawer-nav a:hover { background: #f5f5f5; }
        .drawer-nav a.active { background: #FFF0F0; color: var(--coral); }
        .drawer-nav a svg { width: 20px; height: 20px; opacity: 0.7; }
        .drawer-divider { height: 1px; background: var(--border-light); margin: 8px 16px; }
        .drawer-user { padding: 16px 20px; border-top: 1px solid var(--border-light); }
        .drawer-user-info { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .drawer-user-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--gradient); display: flex; align-items: center; justify-content: center; }
        .drawer-user-avatar svg { width: 18px; height: 18px; color: white; }
        .drawer-user-name { font-weight: 700; font-size: 14px; }
        .drawer-user-email { font-size: 12px; color: var(--text-light); }
        .drawer-logout { width: 100%; padding: 10px; border-radius: 8px; border: 1.5px solid var(--border); background: white; font-size: 13px; font-weight: 700; color: var(--text); cursor: pointer; font-family: inherit; transition: all 0.2s; }
        .drawer-logout:hover { background: #f5f5f5; }
        .drawer-login { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--gradient); color: white; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }
        .drawer-login:hover { opacity: 0.9; }

        /* ─── BACK BUTTON ─── */
        .back-bar {
            max-width: 1100px; margin: 0 auto; padding: 16px 24px;
        }
        .back-btn {
            display: inline-flex; align-items: center; gap: 6px;
            color: var(--text); font-size: 14px; font-weight: 700;
            text-decoration: none; padding: 8px 14px; border-radius: 8px;
            transition: background 0.2s;
        }
        .back-btn:hover { background: rgba(0,0,0,0.05); }
        .back-btn svg { width: 18px; height: 18px; }

        /* ─── LISTING LAYOUT ─── */
        .listing-page {
            max-width: 1100px; margin: 0 auto; padding: 0 24px 60px;
        }
        .listing-hero-img {
            width: 100%; height: 400px; object-fit: cover;
            border-radius: 16px; background: #e8e8e8;
            animation: heroFadeIn 0.6s ease-out;
        }
        @keyframes heroFadeIn {
            from { opacity: 0; transform: scale(1.02); }
            to { opacity: 1; transform: scale(1); }
        }
        .listing-grid {
            display: grid; grid-template-columns: 1fr 380px; gap: 40px;
            margin-top: 24px;
        }

        /* ─── LEFT COLUMN ─── */
        .listing-main { min-width: 0; }
        .listing-badge {
            display: inline-block; background: var(--coral); color: white;
            font-size: 12px; font-weight: 700; padding: 4px 12px;
            border-radius: 6px; margin-bottom: 8px;
        }
        .listing-title { font-size: 28px; font-weight: 800; margin-bottom: 4px; }
        .listing-location { font-size: 16px; color: var(--text-light); margin-bottom: 16px; }
        .listing-meta-row {
            display: flex; gap: 24px; padding: 16px 0;
            border-top: 1px solid var(--border-light);
            border-bottom: 1px solid var(--border-light);
        }
        .meta-item { display: flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 600; }
        .meta-item span { font-size: 18px; }

        .listing-section { margin-top: 24px; }
        .listing-section h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; }
        .listing-section p { font-size: 15px; color: var(--text-light); line-height: 1.6; }

        /* Map */
        .listing-map {
            width: 100%; height: 260px; border-radius: 12px;
            border: 1px solid var(--border-light); margin-top: 12px;
        }

        /* ─── RIGHT COLUMN: CONTACT CARD ─── */
        .contact-card {
            background: var(--white); border-radius: 16px;
            padding: 28px; box-shadow: var(--shadow-lg);
            position: sticky; top: 88px; border: 1px solid var(--border-light);
            animation: slideInRight 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(24px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .contact-price {
            font-size: 28px; font-weight: 800; margin-bottom: 4px;
        }
        .contact-price span { font-size: 16px; font-weight: 500; color: var(--text-light); }
        .contact-rating {
            display: flex; align-items: center; gap: 4px;
            font-size: 14px; font-weight: 600; margin-bottom: 20px;
        }
        .contact-rating svg { width: 14px; height: 14px; color: var(--coral); }
        .contact-divider {
            height: 1px; background: var(--border-light); margin: 16px 0;
        }
        .contact-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; font-size: 14px;
        }
        .contact-label { color: var(--text-light); font-weight: 600; }
        .contact-value { font-weight: 700; }

        /* Phone */
        .phone-section { margin-top: 20px; }
        .phone-number {
            display: flex; align-items: center; gap: 10px;
            background: #F0FFF4; border: 1.5px solid #C6F6D5;
            border-radius: 12px; padding: 14px 16px; margin-bottom: 12px;
        }
        .phone-icon { font-size: 22px; }
        .phone-text { font-size: 18px; font-weight: 800; color: #276749; letter-spacing: 0.5px; }
        .phone-label { font-size: 12px; color: #38A169; font-weight: 600; }

        .btn-call {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; padding: 14px; border-radius: 10px;
            background: #38A169; color: white; border: none;
            font-size: 16px; font-weight: 700; cursor: pointer;
            font-family: inherit; transition: all 0.2s;
            text-decoration: none;
        }
        .btn-call:hover { background: #2F855A; }
        .btn-call:active { transform: scale(0.97); }
        .btn-call:hover { box-shadow: 0 0 0 4px rgba(56,161,105,0.2); }
        .btn-call svg { width: 20px; height: 20px; }

        .btn-directions {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; padding: 14px; border-radius: 10px;
            background: var(--gradient); color: white; border: none;
            font-size: 16px; font-weight: 700; cursor: pointer;
            font-family: inherit; transition: all 0.2s;
            text-decoration: none; margin-top: 10px;
        }
        .btn-directions:hover { opacity: 0.9; box-shadow: 0 0 0 4px rgba(255,90,95,0.2); }
        .btn-directions:active { transform: scale(0.97); }

        .no-phone {
            text-align: center; padding: 16px;
            color: var(--text-light); font-size: 13px;
            background: var(--bg); border-radius: 10px;
        }

        /* ─── LOADING ─── */
        .loading-page {
            text-align: center; padding: 80px 24px;
            color: var(--text-light); font-size: 16px;
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 900px) {
            .listing-grid { grid-template-columns: 1fr; gap: 24px; }
            .listing-hero-img { height: 260px; border-radius: 12px; }
            .listing-title { font-size: 22px; }
            .contact-card { position: static; }
            .nav { gap: 2px; }
        }
        @media (max-width: 600px) {
            .header { padding: 0 10px; }
            .header-inner { height: 52px; gap: 8px; }
            .logo svg { width: 20px; height: 20px; }
            .logo-text { font-size: 15px; }
            .nav { gap: 0; }
            .nav a { font-size: 11px; padding: 5px 6px; border-radius: 6px; white-space: nowrap; }
            .header-logout { padding: 4px 8px; font-size: 10px; white-space: nowrap; }
            .header-right { gap: 6px; }
            .header-user-avatar { width: 26px; height: 26px; }
            .header-auth-btn { padding: 5px 10px; font-size: 11px; white-space: nowrap; }

            .back-bar { padding: 10px 12px; }
            .back-btn { font-size: 13px; padding: 6px 10px; }
            .back-btn svg { width: 16px; height: 16px; }

            .listing-page { padding: 0 12px 32px; }
            .listing-hero-img { height: 200px; border-radius: 10px; }
            .listing-grid { gap: 16px; margin-top: 16px; }
            .listing-badge { font-size: 11px; padding: 3px 10px; }
            .listing-title { font-size: 18px; }
            .listing-location { font-size: 14px; margin-bottom: 12px; }
            .listing-meta-row { flex-wrap: wrap; gap: 10px; padding: 12px 0; }
            .meta-item { font-size: 13px; }
            .meta-item span { font-size: 16px; }

            .listing-section { margin-top: 18px; }
            .listing-section h3 { font-size: 16px; margin-bottom: 8px; }
            .listing-section p { font-size: 14px; }
            .listing-map { height: 200px; border-radius: 10px; }

            .contact-card { padding: 16px; border-radius: 12px; }
            .contact-price { font-size: 24px; }
            .contact-price span { font-size: 14px; }
            .contact-row { padding: 8px 0; font-size: 13px; }
            .contact-label { font-size: 13px; }
            .contact-value { font-size: 13px; }

            .phone-number { padding: 12px 14px; border-radius: 10px; }
            .phone-text { font-size: 16px; }
            .btn-call { padding: 12px; font-size: 15px; border-radius: 10px; }
            .btn-directions { padding: 12px; font-size: 15px; border-radius: 10px; }

            .no-phone { font-size: 12px; padding: 14px; }
        }

        /* ─── BOTTOM NAV BAR (MOBILE) ─── */
        .bottom-nav {
            display: none; position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(255,255,255,0.92); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid var(--border-light);
            padding: 6px 0 calc(6px + env(safe-area-inset-bottom));
            z-index: 900; justify-content: space-around; align-items: center;
        }
        .bottom-nav-item {
            display: flex; flex-direction: column; align-items: center;
            text-decoration: none; color: var(--text-light); font-size: 10px;
            font-weight: 600; gap: 2px; padding: 4px 12px;
            transition: color 0.2s; -webkit-tap-highlight-color: transparent;
            min-width: 44px; min-height: 44px; justify-content: center;
        }
        .bottom-nav-item svg { width: 22px; height: 22px; }
        .bottom-nav-item.active { color: var(--coral); }
        .bottom-nav-item.post-tab {
            background: var(--gradient); color: white; border-radius: 50%;
            width: 48px; height: 48px; padding: 0; margin-top: -16px;
            box-shadow: 0 4px 12px rgba(255,90,95,0.35);
        }
        .bottom-nav-item.post-tab svg { width: 24px; height: 24px; }
        /* ─── SITE FOOTER (DESKTOP) ─── */
        .site-footer {
            background: var(--bg); border-top: 1px solid var(--border-light);
            padding: 24px; margin-top: 40px;
        }
        .site-footer-inner {
            max-width: 1400px; margin: 0 auto;
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 12px;
        }
        .site-footer-left {
            display: flex; align-items: center; gap: 6px;
            font-size: 14px; color: var(--text-light); font-weight: 600;
        }
        .site-footer-links { display: flex; gap: 20px; }
        .site-footer-links a {
            color: var(--text-light); text-decoration: none;
            font-size: 14px; font-weight: 600; transition: color 0.2s;
        }
        .site-footer-links a:hover { color: var(--text); text-decoration: underline; }

        @media (max-width: 600px) {
            .bottom-nav { display: flex; }
            .nav { display: none; }
            .site-footer { display: none; } .header-right { display: none; }
            body { padding-bottom: calc(64px + env(safe-area-inset-bottom)); }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header class="header">
        <div class="header-inner">
            <a href="index.html" class="logo">
                <img src="favicon-64.png" alt="AC" style="width:30px; height:30px; border-radius:7px; object-fit:contain;"><span class="logo-text" style="font-size:18px;font-weight:800;color:var(--coral);letter-spacing:-0.3px;">AbacCondo</span>
            </a>
            <nav class="nav">
                <a href="index.html">Home</a>
                <a href="explore.html">Map</a>
            </nav>
            <div class="header-right" id="headerRight">
                <button class="header-auth-btn" onclick="openModal('auth')">Log in / Sign up</button>
            </div>
            <button class="hamburger" onclick="toggleDrawer()" aria-label="Menu">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
        </div>
    </header>
    <div class="drawer-overlay" id="drawerOverlay" onclick="toggleDrawer()"></div>
    <div class="drawer" id="drawer">
        <div class="drawer-header"><span>Menu</span><button class="drawer-close" onclick="toggleDrawer()"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" d="M6 18L18 6M6 6l12 12"/></svg></button></div>
        <div class="drawer-nav">
            <a href="index.html"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0h4"/></svg>Home</a>
            <a href="explore.html"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l5.447 2.724A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/></svg>Explore Map</a>
            <div class="drawer-divider"></div>
            <a href="profile.html"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>Profile</a>
        </div>
        <div class="drawer-user" id="drawerUser"></div>
    </div>

    <div class="back-bar">
        <a class="back-btn" onclick="history.back(); return false;" href="index.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Back
        </a>
    </div>

    <div class="listing-page" id="listingContent">
        <div class="loading-page">Loading listing...</div>
    </div>

    <script>
    const SUPA_URL = 'https://pekqhcxbhtgfsqtiunic.supabase.co';
    const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBla3FoY3hiaHRnZnNxdGl1bmljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTkxMjMsImV4cCI6MjA5MDQzNTEyM30.YlEBAX2Oh5CKsSeVCS-UZq93np58xUUP0RlddISLgFY';
    let sb, currentUser = null;
    try { sb = window.supabase.createClient(SUPA_URL, SUPA_KEY); } catch(e) {}

    const ABAC_LAT = 13.6116, ABAC_LNG = 100.8370;

    async function boot() {
        const { data: { session } } = await sb.auth.getSession();
        currentUser = session?.user || null;
        updateHeaderUI();
        sb.auth.onAuthStateChange((_, session) => {
            currentUser = session?.user || null;
            updateHeaderUI();
        });
        loadListing();
    }

    function toggleDrawer() {
        document.getElementById('drawer').classList.toggle('open');
        document.getElementById('drawerOverlay').classList.toggle('open');
    }
    function updateHeaderUI() {
        const el = document.getElementById('drawerUser');
        const hr = document.getElementById('headerRight');
        if (currentUser) {
            const name = currentUser.email.split('@')[0];
            el.innerHTML = `<div class="drawer-user-info"><div class="drawer-user-avatar"><svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm0 2c-3.87 0-7 2.24-7 5v1h14v-1c0-2.76-3.13-5-7-5z"/></svg></div><div><div class="drawer-user-name">${name}</div><div class="drawer-user-email">${currentUser.email}</div></div></div><button class="drawer-logout" onclick="handleLogout()">Log out</button>`;
            if (hr) hr.innerHTML = `<div class="header-user"><div class="header-user-avatar"><svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm0 2c-3.87 0-7 2.24-7 5v1h14v-1c0-2.76-3.13-5-7-5z"/></svg></div></div><button class="header-logout" onclick="handleLogout()">Log out</button>`;
        } else {
            el.innerHTML = `<button class="drawer-login" onclick="window.location.href='index.html'">Log in / Sign up</button>`;
            if (hr) hr.innerHTML = `<button class="header-auth-btn" onclick="window.location.href='index.html'">Log in / Sign up</button>`;
        }
    }

    async function handleLogout() { await sb.auth.signOut(); window.location.href = 'index.html'; }

    async function loadListing() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        if (!id) { document.getElementById('listingContent').innerHTML = '<div class="loading-page">Listing not found</div>'; return; }

        const { data: l, error } = await sb.from('listings').select('*').eq('id', id).single();
        if (error || !l) { document.getElementById('listingContent').innerHTML = '<div class="loading-page">Listing not found</div>'; return; }

        document.title = `${l.title} | AbacCondo`;

        const cat = { walking: '🚶 Walking', ride: '🛵 Ride', budget: '💰 Budget' };
        const phone = l.phone || null;
        const condoPos = { lat: Number(l.lat), lng: Number(l.lng) };

        document.getElementById('listingContent').innerHTML = `
            <img class="listing-hero-img" src="${l.image_url || ''}" alt="${l.title}"
                onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 1100 400%22><rect fill=%22%23e8e8e8%22 width=%221100%22 height=%22400%22/><text x=%22550%22 y=%22205%22 text-anchor=%22middle%22 fill=%22%23bbb%22 font-size=%2220%22>No photo</text></svg>'">

            <div class="listing-grid">
                <div class="listing-main">
                    ${l.badge ? `<span class="listing-badge">${l.badge}</span>` : ''}
                    <h1 class="listing-title">${l.title}</h1>
                    <p class="listing-location">${l.distance}</p>

                    <div class="listing-meta-row">
                        <div class="meta-item"><span>🏠</span> ${l.details}</div>
                        <div class="meta-item"><span>⭐</span> ${Number(l.rating).toFixed(1)} rating</div>
                        <div class="meta-item"><span>${cat[l.category]?.split(' ')[0] || '📍'}</span> ${cat[l.category]?.split(' ').slice(1).join(' ') || l.category}</div>
                    </div>

                    <div class="listing-section">
                        <h3>About this place</h3>
                        <p>${l.title} is located ${l.distance.toLowerCase()} and features ${l.details.toLowerCase()}. 
                        This condo is categorized as ${cat[l.category] || l.category} from ABAC Bangna campus, 
                        making it an ideal option for students looking for convenient housing near the university.</p>
                    </div>

                    <div class="listing-section">
                        <h3>📍 Distance from ABAC</h3>
                        <div id="listingMap" class="listing-map"></div>
                    </div>
                </div>

                <div>
                    <div class="contact-card">
                        <div class="contact-price">฿${Number(l.price).toLocaleString()} <span>/month</span></div>
                        <div class="contact-rating">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                            ${Number(l.rating).toFixed(1)}
                        </div>
                        <div class="contact-divider"></div>
                        <div class="contact-row">
                            <span class="contact-label">Category</span>
                            <span class="contact-value">${cat[l.category] || l.category}</span>
                        </div>
                        <div class="contact-row">
                            <span class="contact-label">Distance</span>
                            <span class="contact-value">${l.distance}</span>
                        </div>
                        <div class="contact-row">
                            <span class="contact-label">Details</span>
                            <span class="contact-value">${l.details}</span>
                        </div>
                        <div class="contact-divider"></div>

                        <div class="inquiry-section">
                            <h4 style="font-size:15px;margin-bottom:12px;">Interested? Get in touch</h4>
                            <form onsubmit="submitInquiry(event, '${l.id}')" class="inquiry-form">
                                <input type="text" placeholder="Your name" id="inqName" required style="width:100%;padding:10px 14px;border:1.5px solid #e2e5ea;border-radius:10px;font-size:14px;font-family:inherit;margin-bottom:8px;">
                                <input type="email" placeholder="Your email" id="inqEmail" required style="width:100%;padding:10px 14px;border:1.5px solid #e2e5ea;border-radius:10px;font-size:14px;font-family:inherit;margin-bottom:8px;">
                                <input type="tel" placeholder="Phone (optional)" id="inqPhone" style="width:100%;padding:10px 14px;border:1.5px solid #e2e5ea;border-radius:10px;font-size:14px;font-family:inherit;margin-bottom:8px;">
                                <textarea placeholder="Message (optional)" id="inqMessage" rows="2" style="width:100%;padding:10px 14px;border:1.5px solid #e2e5ea;border-radius:10px;font-size:14px;font-family:inherit;margin-bottom:12px;resize:vertical;"></textarea>
                                <button type="submit" class="btn-call" id="inqBtn" style="width:100%;text-align:center;justify-content:center;">
                                    📩 Send Inquiry
                                </button>
                            </form>
                            <div id="inqSuccess" style="display:none;text-align:center;padding:16px;color:#065f46;background:#d1fae5;border-radius:10px;font-weight:700;">
                                ✅ Inquiry sent! We'll get back to you soon.
                            </div>
                        </div>

                        <a class="btn-directions" href="https://www.google.com/maps/dir/?api=1&origin=${ABAC_LAT},${ABAC_LNG}&destination=${l.lat},${l.lng}" target="_blank">
                            📍 Get Directions from ABAC
                        </a>
                    </div>
                </div>
            </div>
        `;
        // Init interactive map
        initListingMap(condoPos, l.title);
    }

    function initListingMap(condoPos, title) {
        const mapEl = document.getElementById('listingMap');
        if (!mapEl || typeof google === 'undefined') return;

        const ABAC = { lat: ABAC_LAT, lng: ABAC_LNG };
        const bounds = new google.maps.LatLngBounds();
        bounds.extend(ABAC);
        bounds.extend(condoPos);

        const map = new google.maps.Map(mapEl, {
            center: condoPos,
            zoom: 15,
            mapTypeControl: false,
            streetViewControl: false,
            fullscreenControl: true,
            zoomControl: true,
            styles: [
                { featureType: 'poi.business', stylers: [{ visibility: 'off' }] },
                { featureType: 'poi.park', elementType: 'labels', stylers: [{ visibility: 'off' }] }
            ]
        });

        map.fitBounds(bounds, 50);

        // Condo marker
        new google.maps.Marker({
            position: condoPos,
            map: map,
            icon: {
                path: google.maps.SymbolPath.CIRCLE,
                fillColor: '#FF5A5F',
                fillOpacity: 1,
                strokeColor: 'white',
                strokeWeight: 2.5,
                scale: 10
            },
            title: title
        });

        // ABAC marker
        new google.maps.Marker({
            position: ABAC,
            map: map,
            icon: {
                url: 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40"><circle cx="20" cy="20" r="18" fill="#1a73e8" stroke="white" stroke-width="3"/><text x="20" y="24" text-anchor="middle" fill="white" font-size="16" font-weight="bold" font-family="sans-serif">🎓</text></svg>'),
                scaledSize: new google.maps.Size(40, 40),
                anchor: new google.maps.Point(20, 20)
            },
            title: 'ABAC Campus'
        });

        // Try to show actual road route, fallback to straight line
        try {
            const directionsService = new google.maps.DirectionsService();
            const directionsRenderer = new google.maps.DirectionsRenderer({
                map: map,
                suppressMarkers: true, // Keep our custom markers
                polylineOptions: {
                    strokeColor: '#FF5A5F',
                    strokeOpacity: 0.7,
                    strokeWeight: 4
                }
            });

            directionsService.route({
                origin: ABAC,
                destination: condoPos,
                travelMode: google.maps.TravelMode.DRIVING
            }, (result, status) => {
                if (status === 'OK') {
                    directionsRenderer.setDirections(result);
                } else {
                    // Fallback: draw a straight dashed line
                    drawFallbackLine(map, ABAC, condoPos);
                }
            });
        } catch (e) {
            // Fallback: draw a straight dashed line
            drawFallbackLine(map, ABAC, condoPos);
        }
    }

    function drawFallbackLine(map, from, to) {
        new google.maps.Polyline({
            path: [from, to],
            geodesic: true,
            strokeColor: '#FF5A5F',
            strokeOpacity: 0.6,
            strokeWeight: 3,
            icons: [{
                icon: { path: 'M 0,-1 0,1', strokeOpacity: 0.6, scale: 3 },
                offset: '0', repeat: '16px'
            }],
            map: map
        });
    }

    // ── HAPTIC FEEDBACK ──
    function haptic(type) {
        if (!navigator.vibrate) return;
        const patterns = { light: 10, medium: 25, success: [10, 50, 20], error: [30, 50, 30] };
        try { navigator.vibrate(patterns[type] || 10); } catch(e) {}
    }

    // Add haptics to action buttons
    document.querySelectorAll('.btn-call, .btn-directions, .back-btn').forEach(btn => {
        btn.addEventListener('click', () => haptic('light'));
    });

    // Stagger section fade-in
    document.querySelectorAll('.listing-section').forEach((el, i) => {
        el.style.opacity = '0';
        el.style.transform = 'translateY(16px)';
        el.style.transition = `opacity 0.4s ease ${i * 100 + 200}ms, transform 0.4s ease ${i * 100 + 200}ms`;
        setTimeout(() => { el.style.opacity = '1'; el.style.transform = 'translateY(0)'; }, 50);
    });

    // ── INQUIRY SUBMISSION ──
    async function submitInquiry(e, listingId) {
        e.preventDefault();
        const btn = document.getElementById('inqBtn');
        btn.disabled = true; btn.textContent = 'Sending...';
        try {
            const inquiry = {
                listing_id: listingId,
                name: document.getElementById('inqName').value,
                email: document.getElementById('inqEmail').value,
                phone: document.getElementById('inqPhone').value || null,
                message: document.getElementById('inqMessage').value || null,
                status: 'new',
            };
            const { error } = await sb.from('inquiries').insert([inquiry]);
            if (error) throw error;
            // Show success, hide form
            document.querySelector('.inquiry-form').style.display = 'none';
            document.getElementById('inqSuccess').style.display = 'block';
            haptic('success');
        } catch (err) {
            alert('Error sending inquiry: ' + err.message);
            haptic('error');
        }
        btn.disabled = false; btn.textContent = '📩 Send Inquiry';
    }

    boot();
    </script>
